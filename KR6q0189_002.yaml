body:
  text: 苕上後學弟子王祺校閲紫柏第六世孫契穎壽梓上本師和尚夏秋以來法音靈響杳爾無聞兀坐寒巖時切縣注興勤歸山備悉起居兼知應供金壇且於十月望筮期書經良用為慰蓋時當末季按劍者多夜光難授玻璃器鮮師乳艱投矧左右之間內外侍護兩無其人即老師智應無方自能群機圓攝而開也一念管窺之見于此終不能旦莫釋去耳即如開守空林所與不過緇流衲輩若但恁麼去則鮮不歡欣踊躍而來若不恁麼去則未有不攢眉蹙頞而往佛少魔多子希賊衆智遺識合比比皆然每念及茲涕淚中隕雖己之貢高我慢褊急庸常種種染習濃厚不能真心雅量以納四來誠當自懺自損若欲婆情婦態盡悅衆心自揣非菩提薩埵有不能也至於刻藏公案亦但鞠躬盡瘁死而後已成敗利鈍悉付因緣豈能逆睹苟當緩急危難之際每想及老師潭柘塔院法門為重刻經次之刻經但隨緣法門不可壞之語良足以為軌持矣臺山鐵鋪村已改作新民店蓋有司欲自庇因而庇及僧民此固曼殊大士慈力冥加或未可知第其中究竟終有不可必者在也向欲詣都城一則以鐵鋪未寧一則以刻工未調故爾遲遲此去臘底或可行耳即今寇洮州住劄兩月餘虜掠日甚欽差大臣袖手求和而不可得及上疏則又自以為石畫奇謀有非李郭韓范諸名公所可及也者朝廷弱甚則曰威嚴情驕甚則曰依附上下欺蔽其何所底極乎近且遼薊松蟠又報警矣國家事勢日削日孤而內外臣工交相頌美一有針砭輒生忌諱恐不釀成靖康之禍不已也以此觀之凡我釋子大都宜休隱林泉爐香碗水冥為祝釐國士筵中豈其所宜是故雖入都門亦或未容久留矣山中期場終始未卜何狀每當朔望稱禮曼殊祈禱老師杖履來山作我眼目然終未有以搖動老師心王此豈非開之念力有未真耶良自痛恨良自痛恨曇生師行顓此問訊若開也誠駑駘負重圖適千里𨈀蹶誠多惟老師時放慈光哀憐照策之握筆悲淚不盡欲言與徐海觀居士大師前以四大推身為問與圓覺四大分離今者妄身當在何處是同是別又以四蘊推心為問與達磨將心來與汝安是同是別海觀直截會得到不別而同必須盡情吐卻抖擻精神另道一句來看更冰水之喻與兩箇三箇之説於智識上極要體貼親切瑩徹毋作戲辭泛論不然則纖毫翳滯便為見處乖離便為生死窠窟古云毫釐有差天地懸隔邇來士大夫政為聰明所纍或於耳目根頭少有入處便自執認將去便自安穩將去甚非生死分中真實究竟者況像末魔眷尤隆有云我今四大身中能見能聞者即我自性四大有壞自性不壞不知此政四蘊之心認賊為子有云空此四大併此見聞現今寂然不動者即我自性不知此政根本無明喚奴作郎目不自見月不自照雲翳黯然徒勞向空中揣摩身中指舉若雲翳既除眼自見眼月自照月無有是處何以故絶盡凡情別無聖解若作聖解即受群邪如此畢竟喚甚麼作自性海觀試自道看海觀念生死事大便請今日黜其紛飛浮習辦我真實肯心向揮毫染翰時與他日為上為下時崖柴將去如針磁相翕不暫放捨討取箇清白下落斯不枉大丈夫出世一番如欲先了世緣然後向生死上究竟亦希存此為他時軫藥之一助海觀于佛祖言句上研味既久而貧衲以婆心太切撮拾餘涎剩唾贅疊如斯亦何異陳藜羹於珍羞之側獻野褐於文繡之前也笑笑與曹林師兄昔黃龍南公住歸宗時以寺災逮獄見訊獄者必盡得其情而後已情弗盡弗已也情逾多則刑逾倍之矣不獨此即黃蘗之于臨濟睦州之于雲門船子之于夾山汾陽之于石霜亦率多爾爾蓋弗爾其何以斬截情關煆煉凡聖乎開不肖每于老和尚鉗鎚之下輒欲盡情放下覿體承當如臨濟從大愚歸黃檗相似俾老和尚無處下手足報其恩奈何習氣濃厚偷情滋多正眨眼定動遂已違時失候甘受沈埋辜負恩德由是因循待續愈出愈奇致令法令日繁情弊日生違背既久則反恩為怨者有之狐疑鬼猜者有之欲進欲退者有之開不肖正當恁麼時則庶幾能猛急掀翻自怨自艾知恩感泣此念雖如一髮千鈞則他日終賴以報恩有在也昨于賀氏舟中別師兄睹其言辭志概大都退屈居多不委師兄平素嘵嘵豪氣千丈今何為若此果以了大事更別有法門在耶抑甘心以此未了因緣自纍塵劫耶抑謂藥汞銀未堪真火欲自飛去也善知識家風從來變幻靡測所貴學人無以情識當之以情識當之則何異卻步求前愈行愈背即弟居妙德可謂深心極力調持然上下百餘人求其能以心相照者鮮矣況善知識作略豈愚昧情執所能龜灼哉願吾兄于百尺竿頭正是放身捨命時節無向此寸尺肉團上剎那光景中妄自卜度甘沈永劫也祝祝性曉既從兄剃落亦非小緣弟每念其識慮既非高朗修習又無把捉或不無情順智逆順進逆退之病惟吾兄亦當以此紙示之令其時庸佩服脫當進退兩難之際則自有出身之路也間情種種盡屬枝末不悉與曙天師弟大都修行不得力只為不識心古德云若人識得心大地無寸土近來相見吾弟似覺煩惱轉多習氣不減煩惱即心所煩惱即境境不自境因心故境心不自心因境故心心境相因各無自性智者了達猶若交蘆謂煩惱及煩惱境為實有而被其所轉者衆生之見也煩惱及境俱非實有則盡十方三世更有何法足當吾情故曰大地無寸土夫盡大地皆土而曰無寸土何也若盡大地有寸土則心外便有煩惱可得又圓覺經云隨順覺性吾弟今後觸境逢緣少有纖毫憎愛情生即當以此四字口念心想入其三昧入已即隨順覺性便不隨順愛憎無明矣何以故全體覺性更覓愛憎無明了不可得故覺性如虛空了無隔礙有諸隔礙諸境自礙虛空無隔礙故覺性如牟尼寶珠清淨瑩徹了無色相有諸青黃境自影現摩尼非青黃故此又古人所謂以諸譬喻而能悟入者也吾弟其勉之與李次公居士善知識難事蓋其變幻若雷龍鬼神不可測其瞋喜其蘊藉若須彌娑竭不可測其高深其拄杖拂子若虛空摩尼不可測其方圓橫直苟英才利器不須彈指謦咳便奪其符命掉臂入關直搗其閫奧承其家業綜衡而受用之其或未然使非朝熏夕陶月漸歲染惡能管窺其萬一而不以驢鞍橋認作阿爺下頷也故龐公之于石頭馬祖蘇長公之于參寥張無垢之于妙喜皆盡命稟決沒世咨參豈漫然哉且也世諦父子必以滴血入骨取驗矧欲作法王子祈紹佛種而可冒濫依稀得之今次公之于本師朝親暮攜十寒一暴又安怪夫理不透徹事不相應也惟次公自審之曇生師行速燈下草草以復不盡欲言又與曙天師弟華嚴經跋時在心曲無奈叢林上下皆欲調持刻經修營皆自總理乃無暇刻一及于此即有少間又或經行林壑兀坐蒲團以恣昏散以故厚負吾弟之懇良自愧焉計此去都城途中甚為間適當為吾弟勾當之即覓便寄之而南儻大經業就裝潢但于第八十卷尾多存白箋數紙可也楞嚴聞頗安適甚用為慰忠菴師老成果決凡百議論規誨吾弟與法空須稟從之無相人我以取物議興照來寺須與之言金壇檀施若已取足惟除南京支付外其餘悉付曇生師買辦貨物來山興照只取留五兩買辦糧食安置其母外取二兩作盤費來山或領朱仰峰工作來山亦可金壇若未支取完足其餘聽曇生取之可也別面如昨律候載遷一失此身便屬來世升沉未卜苦樂無期六時之中須知自辦若一切緣事無甚攀攬貪他一粒米失卻半年糧況汝元非涉緣之人猛省猛省與忠菴師聞楞嚴叢林近頗安適二時鹽醬亦自不少此蓋吾師真心實行所感良用為慰不肖居山叢林上下百責萃身自朝至暮略無暇刻兼之經典款則一一經心工匠胡亂一一調制所幸得於萬火叢中煆煉身心所有無量劫來自由自在自高自慢自局自狹種種惡習因之消去萬一耳古德云金由火煉心由境煉信矣夫幻菴賁菴二兄既寓嘉興或至楞嚴至則但當挂搭堂中以十方客禮待之當時有事楞嚴曾于老和尚前盟言胸中初無一指甲土昨塔先師靈骨于楞嚴雖屬權宜而老師尚譴責不貸況吾同師兄弟身有寸土其能免于諸佛如來諸大知識之罰乎惟師憐念于我不以情識假借執實行之楞嚴百事惟此為重諒二兄亦有以照亮我也梅村居士老成練達凡百事請過商確雲濱明卿翌文季玉諸居士俱不及一一致書均乞道意東園先生子山長者儻至楞嚴并乞致聲堂內外諸師無遑一一稱名問訊統惟吾師普及一言餘瑣瑣不悉與沈及菴吳孚泉周仲大周季華四居士興勤歸山常熟庚寅二緣松江己丑一緣丹陽庚寅一緣俱已如各細單檢到第訒卿補償松江緣內一封三十兩成色甚為低下此則訒卿家人之過也江南諸緣訒卿既已來北想諸居士中無有能隨方總理之者若待送至反成擔閣姑令俱付曇生師親收業且屬曇生師一一身往理會之矣儻其中有不能速集者則屬之送季華處俟陸續令人取之曇生師歸山時季華須索其欠單以便作書不時令人督促江城庚寅年分資想已合集幸開細數付曇生師己丑年檀越姓氏已刻完者俱印刷以往其未完者不過數卷繼此完報蓋始事之初刻工來遲兼之曇生師以腳力之便又發之太速故不能盡如所願耳徐文卿庚寅年分儻訒卿已有區分則季華當於金澤索付曇生師如訒卿未有所祝即俟不才取之都城已耳許水利王房仲二緣原在十數之外儻其無自肯心不必強之以難蓋佛事門中凡有所建立一惟時節因緣時節因緣若及則能令人增長菩提心時節因緣未及則能令人退失菩提心令人退失菩提心伊誰之咎矧江南歲計仍凶而欲令諸長者居士修舉檀度誠為大難安忍強之乎九蓮居士寄我觀音像謹拜受幸為我謝之康孟修索書盂蘭盆經亦呵凍塞責江城諸長者居士不能一一致書惟此一音普申問訊新刻楚石諸典各以一部歸之江城作法供養惟照納之與朱濟川樂子晉二居士妙德在清涼最幽深處清涼為震旦大菩提場刻藏因緣卜吉於茲信非人力南北雲集僧伽百餘或團圞坐冰雪堆中安般希微兀若枯木或勇健向昏散場內身心踊躍氣奪三軍或架榾柮燒品字則本光盎然或持籤軸剔蠹魚則義天廓爾兼之二三知己東語西話提唱無生瓊樹琪葩萬壑千林宣揚玄妙斯時若更得子晉把筆題詩濟川敲冰煮茗信當今絶勝人世希逢由是卻觀長安車塵馬迹中人腰背寒酸眉眼高下傴僂踧踖孤露伶俜即欲聞斯勝事不啻盲龜值木滾芥投針何況得見且身親證入耶兩居士幻寓燕都甚非有堅固利名為之轡靮發心特易到岸非遙詎終能恝然於此而無意也復董玄宰太史鏡喻辨明鏡當臺胡來胡現漢來漢現佛來佛現祖來祖現天人修羅及以鬼畜隨所來現無毫髮爽明鏡初未嘗自云我是鏡我將明照物物像何狀亦未嘗自云我不知我是鏡不知我是明照物非明照物亦不知物像何狀即傍觀者曰此鏡此鏡之明此明中之像何狀此鏡外之物何狀亦是剩語蓋人能著語媸妍過去久矣貧衲謂非鏡明將安寄非明鏡安能當臺照物又謂鏡能照物物能照鏡若物不能照鏡則鏡亦不能照物又謂鏡不能照物物不能照鏡若鏡能照物謂銅能照耶明能照耶謂銅能照則一切銅器何不照物謂明能照此明為生於銅為生磨琢為從外來謂生於銅一切銅器何不生明為生磨琢磨琢木石何不生明為從外來來從何所鏡之壞也明復何去若物能照鏡則盡大地皆物則皆照皆照則皆應名鏡安得物物異名又物物皆照則諸世界豈成安立古人有問兩鏡相對時如何云打破鏡來與汝相見請玄宰不眨眼佇思信口答話吻合古人符契然後可論鏡喻之説若剎那擬議話會再急性三十年參去尚不得一半那討間工夫論長論短爭是爭非雖然自法自犯絡索一上來教謂鏡猶性也鏡中之像即緣慮也鏡外之物即六塵也諸佛猶如空鏡凡夫猶如對像之鏡或曰豈聖人心不能應物如鏡必不照物乎玄宰又謂鏡雖不照物自具能照之用若照一物即有所不照但空鏡則無所不照或曰物在鏡外而鏡不照是聖人拒物而不應乎玄宰又謂聖人之鏡決非照物凡夫之鏡除卻色像即是明鏡或曰像由外物豈留鏡中鏡不受塵何妨照物玄宰又謂聖人有世流布想而無著想如一空鏡秪照於空世流布想者照空也著想者照塵也貧衲看兩家問答如三家村小兒戲陳安望其輪刀見血大決雌雄又如鄉丞亭長之聽獄也安望其鞠盡偷心據案結款而民服無辭耶蓋諸佛之鏡大圓明淨者也聲聞乃至菩薩之鏡自昏以至明自小以近大者也凡夫之鏡昏而小者也盡十方三世猶一幅畫諸佛之鏡量與齊等普展則普現分展則分現青黃紅紫種種形像毫無所遺第對鏡衆生不能眼同佛鏡次第看去就自眼量謂佛鏡照一物即有不照耳方畫之展色像之現也鏡之明猶故也及畫之收色像之亡也鏡之明猶故也聲聞乃至菩薩則有照有不照即照不無昏明大小之不齊然其既復之明則亦不因照與不照而有加損也凡夫則自隘其量塵翳其明於諸色像顛倒媸妍照青為黃照紅為紫隨其所現妄生分別是知大圓明鏡性也鏡大圓明照一切物現一切像而無所留礙無所動搖無所增損性之用也諸佛乃至一切衆生皆證圓覺者此也翳鏡之塵緣慮也鏡外之物五陰六入乃至四諦十二因緣等也鏡中之像在諸佛菩薩則色色形形莊嚴妙境在凡夫則昏迷妄執畫彩三途故欲鏡之明不必與外物作仇讎去翳塵而已欲衆生之佛不必與外境作仇讎去緣慮而已故曰絶盡凡情別無聖解玄宰以鏡喻性則可謂像即緣慮則不可謂佛鏡具能照之用則可謂秪具能照之用決不照物則不可謂大圓鏡智照無所照則可謂照一物即有所不照則不可謂逐物逐照非佛鏡則可謂空鏡照空為佛鏡則不可謂除卻緣心即是真心則可謂除卻色像即是明鏡則不可蓋惟其照物故名明鏡自覺覺他故名為佛非照物鏡將安用非照衆生佛何得名故經曰照五蘊空又曰照十八界十二因緣四諦等空故曰照空非秪照空故曰照空又謂世流布想者照空也著想者照塵也尤為背戾蓋世流布想者照一切物也無著想者不留礙也又謂夢中事可令覺者應乎豈不以聖人之鏡決不照衆生在迷之物不知有等幻術以藥鑄鏡能照諸鏡不照之相如照幽鬼及人腑臟及隔壁隔宿之事又如羅漢飛空透礙乃至十八神變非隔礙凡夫所識覺人能見彼睡人夢中種種物相則又如來如幻藥鏡無礙神通非諸常鏡常人可比擬思議其萬一也故曰惟佛與佛乃能究盡當無以未至之見不齊之喻苦為法障若必用覺夢喻當就一人分上以覺喻佛夢喻衆生豈有既覺人而不了夢中事若不了夢猶在夢中決非覺者玄宰比來論議得無於緣起無生及背觸俱非話頭中契領有未的當耶或契領時不無預先將生滅心眼眨眨地擬向承當故所契仍落鬼家窠窟耶玄宰又謂於古尊宿種種言句確然無疑恐所舉中妙明體盡知傷觸句決然未曉一句未曉多句即曉恐亦未真現世士林中切切以己事留心者不少然貧衲所往來惟玄宰為鸞鳳願於此七八分所在再加急鞭快櫓一上不到古人田地不休是望是望賤體已平復深勞遠念并謝與孫仲來王宇靖于中甫三居士善知識難事佛法難聞始吾于斯語也視若尋常俗諺弗以為然逮觀我釋迦如來乍離兜率始降王宮目顧四方周行七步遂曰天上天下惟吾獨尊當是時也賞音者誰逮及雲門猶然謗詈載睹明星自稱悟道雙垂兩象演唱雜華諸大聲聞盡皆聾啞下此而臨濟之于黃蘗猶以打行慈明之于汾陽且作罵會則信夫難事難聞之語不我欺哉近知本師應供金壇書寫經典此誠難事難聞之秋惟諸居士各各努力前驅以圖報恩弗爾則未有不聾啞未有不謗詈未有不作打罵會耳雖然要且夢見雲門臨濟慈明鼻孔向上麼勉之勉之刻經檀資己丑年分俱已檢到第以刻工來遲未盡登木茲以已完者先馳往其未完者陸續完報蓋創始之初事難卒備而曇生師南發又未可遲遲故爾繼此以往或可歲清一歲不至如是堆塌耳庚寅年分昨已遣王道至金壇想已支應儻有未全其餘即付曇生師亦可但金陵衆工之物須一一付足王道以勾當其事檀越姓氏亦須一一明白揭示諸檀越不及一一具訊惟此一音普作供養惟三大士轉致之與徐孟孺康孟修陸中復三居士佛事門中大都有所建立一惟時節因緣不可違失江南歲計仍凶而欲長者居士於其中修舉檀度不已難乎所貴二三居士深心調攝俾各願王無或動搖斯為至行蓋吾人于無量劫來發一念菩提心是何異優鉢羅華一現苟為急之而使其暴損緩之而使其退墮皆非善為調攝善觀時節因緣者也惟二三居士厚留意焉己丑年分一十二人所施俱已如數檢到其有定緣未付者幸更集之并庚寅繞緣俱發曇生師歸山儻未能旦暮速就且令他往約其再至領發又不爾則孟修居士親為送至周季華可也己丑檀越姓氏以資施入山未旬日盡未登木楚石語録寶訓水懺因明論禪門口訣諸新刻雖非雲間檀施亦各以一部奉之隨喜作法供養令普生法喜惟照收之顧仲修居士欲獨刻一部既屬最初發心自不得不從之矣孟修屬書盂蘭盆經呵凍染卷殊為草率且山林人于書法原不通曉第取其未動筆以前一點為老堂作冥資福利已耳諸檀越不能一一致書惟此一音普申問訊與公錫居士別歸清涼至阜平聞本師和尚飛錫彭城將西去蘆芽遂迎之清涼今尚挂錫清涼不遠隨侍和尚杖錫結夏清涼矣刻經因緣部劄實為根本于大宗伯果得所請否此事不委此時可一言之李宗伯老師以成此勝緣否時節因緣或不可失況祠部文劄俱已現成李老師肯一言以及祠部或無難事惟足下共文卿居士圖之李老師并祠部或更得文卿求臺翁勸發之亦可也張公事體究竟何狀幸一一示之與幻居師兄師兄別去長途安否此時挂錫何所向所云云須祕密和緩無強人以不欲蓋我法中凡有所建立當觀時節因緣時節因緣及盡則諸佛菩薩自然哀憐天龍善神自然呵護弗爾即醫得眼前瘡未免剜卻心頭肉矣以此較彼得失奚啻徑庭哉統惟師兄善自調策時光迅速人命無常法道荒涼願共勉力與傅伯俊居士人生夢幻百年瞬息進退行藏可無定謨不肖雖處巖穴中每從定起未嘗不于廟堂諸相知一照燭也大都縉紳人既與聞出世法在五十以前則當鞠躬盡瘁以報君上以展生平以了世緣在五十以後則當解組林泉以順性真以求出世此則所當截然判斷無復優遊虛度當進則務適偷安當退則畔援欣羡事與年違兩無成立非丈夫也周詩有言殷鑒不遠在夏后之世以今觀于立朝諸老白首龐眉足趑趄而口囁嚅尚復羈縻不捨此豈非在昔偷安務適者哉不佞謂足下今日正匪躬報主時也何得以間情野性久曠忠貞惟足下圖之與汪仲淹居士月五日得接長公所撰刻大藏序手捧誦之鏗然金玉真可謂匠心獨妙舌相廣長者矣念貧衲以末法窮兒妄意荷擔長者家業誠何異負九鼎圖適千里識者鮮不難之然肯心自許莫之或禁今厚賴諸賢豪長者光嚴照策儻不至敗轅佚駕以終厥事則他日頂爇栴檀用答檀謢恩寧過分哉惟諸仁者更屬意焉不日發清涼卒且未能詣丈室問疾可否夫疾不從四大生以地水火風各無我故亦不從四蘊生以受想行識亦各無我故四大無我四蘊無我膚之不存毛將安寄信斯疾也來無所從去無所至則謂居士實有如是病者眚目空花也願居士于十二時中入此三昧以自受用宋繡佛像并紫檀手掐俟叔宗將至當為居士瞻禮持念不忘與曾舜徵居士經云發心畢竟二不別惟是二心初心難蓋因地不真果招迂曲因心靡獲果覺無階即有事修持盡名癡行故曰但貴子眼正不貴子踐履又雲門大師云光不透脫有兩般病一切處不明面前有物是一透得一切法空隱隱地似有箇物相似亦是光不透脫又法身亦有兩般病得到法身為法執不忘己見猶存墮在法身邊是一直饒透得放過即不可子細點檢將來有甚麼氣息亦是病向觀居士見處大都在雲門四種病中蹲坐出入別來面目不委復作何狀為復仍舊為有新得幸將此語自診自候務在眼得其正斯向一切處行履自無墮坑落塹之患矣信菴老師得參謁于吳門云不久將入燕都家老師由峨眉反南嶽挂錫未久即發金陵其留心南嶽甚惓切且有結菴之願也尊翁老先生及晉明居士皆未及面蓋以老師行速故耳呵凍不盡與馮開之居士別來如昨律候載遷信人命無常浮生能幾吾輩于法門中自稱雄傑而復優遊退墮無異尋常虛浪沈埋甘為塗炭生無所建立死無所指歸誠何以仰追先哲取信後昆而免嘵嘵拔舌之苦乎且衆生從無量劫來能一念發菩提心奚啻優鉢羅華一現此而損失後得何期爐炭鑊湯蛆蟲蚊蠓剎那萬狀寧復終窮言及于茲涕淚中隕願共居士勉之刻藏因緣雖已就緒然期場南北未卜終始此方撰述校讎端屬名賢幸無忘念新刻楚石語録諸典各一部遠充法供幻居兄挂錫徑山否護持之責舍足下其誰并乞留意與賀知機伯仲先覺有言一句染神咸資彼岸彼岸到梵語波羅密釋之者曰涅槃果覺也夫吾人自春徂秋從幼至壯所聞所見乃至所攖且觸者奚啻一句而猶然此岸何耶則未有以染神故也蓋衆生自一念悖覺以來色心諸法皆以八識三分為其根種因緣故根境相偶善惡諸緣必假前五招來六識分別末那傳送以持種于含藏之中使非含藏持種則今日云為明日且遺忘之盡矣矧老壯而猶記憶童稚之事耶故吾人于含藏識中顧所以染種何如耳染之以五常五戒則具足人相染之以十善禪定則生天染之以好勝猜忌則居修羅染之以四諦法則成聲聞染之以十二因緣則證緣覺染之以四誓六度則修菩薩行染之以一乘寂滅三德圓明之道則取涅槃乃若染之以殺貪淫則報畜生染之以慳偷狹劣則墮餓鬼染之以五逆十惡則投地獄是所染殊塗而升沈異轍染之義亦大矣可不懼夫學人誠能于日用之間與嘉言令訓晨夕相對仁師賢友晨夕相親則一言半指自足以動我心王心王既動則含藏識中染種自摧染種既摧淨種自茂淨種既茂則凡菩提緣感一有染觸則自能萌蘗發榮枝幹條達華果圓成而于涅槃果覺也何有反是則未有不淨種摧滅穢種滋強外緣所熏惟強自合如是而欲免夫三塗六道之果也得乎賢伯仲既于身心性命中少知回頭轉腦幸于善惡熏染之機貴知所以決擇去取可也人生轉燭世相空華一失此身便屬後有惟賢伯仲勉之庚寅年分刻經檀資已一一檢到行且旦莫登木矣第己丑年分資物雖至而無細單不知孰為多少檀越姓氏未便入梓有便幸詳示之與大司空陸五臺門下四大調和不想諸天龍當為護法者護無庸鄙念第生死事早莫難期門下于世間法亦庶幾矣願速作歸計共青山白雲參究一會免得臨命終時手忙腳亂此實丈夫家千生萬劫未了一最大因緣莫只擬議卜度過了平生古人有言若非徹證即解會入微但可鬧熱眼前一場魔病及一段憎愛境緣現前便爾忘卻省得起來受傷多矣況生死關如急水灘頭才眨眼佇思便喪身失命何以故擬議解會屬生滅心故生滅因豈能證不生滅果門下素馮陵法道中貧衲亦嘵嘵坐此願同門下大死一番不然恐纍法門不淺貧衲前歲唯恐門下不出非他為衆生故今唯恐門下不歸非他為門下故為門下亦所以為衆生門下以為何如與張梅村居士別來曾不一瞬時序忽已迭更人生幾何光陰迅疾想居士信根深厚慧焰高朗晨夕之間端能以出世為懷固無事山僧之喋喋也己丑年刻經檀施俱已檢到第以刻工來遲未盡登木茲將刻過姓名先呈覽閲其未完者陸續完報蓋筮創之初事難卒備而曇生師南發又未可遲遲故有是事繼此以往自當歲完一歲或可不至如是堆塌耳庚寅年分未審集否如其已集乞即檢付曇生師仍須一一揭示姓名以便入梓明卿居士暨諸檀越俱不能一一具訊統惟致聲楚石語録皆嘉興之刻水懺寶訓諸典雖非嘉興所刻并以奉覽助法喜也傳諸檀越一過目已即存之楞嚴可乎楞嚴近作何狀惟時過護持之了空師居山頗順適無庸尊念與陸五臺大司寇前所云云昨聞滇南警報且踵至此意者造物為不辜之人導之生路乎夫緬人今日所以圖報孟養者不過欲雪殺大朗長逐散奪之恥然孟養昔日聽蠻莫之説明同蠻莫卻緬以歸款天朝者誰則尸之觀緬人今日之報仇則邊臣昔日之奏功可知觀孟養今日之喪地則邊臣昔日之拓地可知且蠻莫迤西歸緬已久而款貢則自丙戌丁亥始此果誰之力也其功奇其禍亦奇其忠大其罪亦大實李兵憲之謂矣是雖信而見疑忠而受戮自古有之即兵憲亦或能以此自安第緬人仇視蠻莫迤西自丙戌至今亦既數載而今日始為興兵掠地謀者豈不以昔日撫聯蠻莫迤西而討我者李兵憲乎今且繫之獄中矣寧復有應援蠻莫迤西而為兵憲之續者耶即有之抑豈能盡如兵憲之奇謀石畫耶緬人素姦穎詭察計必出此此一舉也信不惟唇亡迤西而蠻莫諸司且齒寒矣審既爾則國家邊疆之患又豈獨北而緬蠻之咆哮猖突又豈出下哉識者謂為國家今日西南之計信莫如仍以李兵憲帶罪立功則其輕車熟路展布無難且也使過尤君人之盛德而所以上培聖德下拯沉怨其時節因緣惟在今日舍此則無復可圖矣然此非大司馬真心實力以主持于其中而宰執九工為之上下左右極力方便以贊成之不可也惟門下以無緣之慈施不報之恩深心成就則不獨軍國解西南之急而山林野人亦藉以酬水土之恩矣幸留意焉幸留意焉答嶽石帆居士時石帆以時事上疏候旨長安門以八行報不佞有云偶逐有為元非住相業且將臭皮囊俟廷杖云云法無有為無為亦無有相無相但衆生不了目前見法遂有如是等藥病之言脫能脫體玲瓏眼光爍破四天下則大火聚中可能將夯得一莖眉毛出麼如是即大用繁興了無一物刀山劍樹坦爾平夷故清素謂兜率悅公子但堪入佛不堪入魔今入魔時節因緣也願足下努力因明解敘離六根空五蘊亦良由足下此時第一觀門須時時覿面與黃貞父居士別後未審令師因緣竟作何歸結此中縣切可言司寇公既轉銓曹其于恤審事已得究竟不于此則公案果終始實心相的當否彭生冤纏抑亦果遂解脫否幸一一裁示令師為一代人豪而罹此咎此豈善惡因果所宜有哉然先德有言欲知先世因今生受者是欲知後世果今生作者是世固有善人君子而獲困窮頑夫憸人而享利達而遂謂善惡爽報因果非實而不知通之以三世之説則因果截然無毫髮爽而趨善避惡當益自力肯以現世之困窮利達之爽厥報也而動念哉雖君子修身固非求報菩薩利世初非有為然標影曲直亦自不泯通乎此然後君子之歷困窮利達也始能無入不得隨寓皆安太虛浮雲空無朕迹不然寧免礙膺之物哉令師高明信此為剩語然敗鼓之皮良醫不讓故及之與文卿居士向歸清涼至王快接老師法旨知其北來遂逆至清源乃老師杖錫尚在彭城復至彭城不謂老師又南去淮揚矣不肖恐山中有故蹤迹太遼絶無能援應遂卻歸清源彌陀寺候之計旬日當必隨奉老師入山度夏或齎送老師所書法華楞嚴西去蘆芽未可知也老師書經之願蓋三十年矣曾于武塘瓶山關室中一語及不肖今老師得完所願且作圓滿道場江南僧俗皆得幸霑法潤獨不肖未得效涓滴與法緣誠自恨夙業障重根莖薄劣耳慈航師兄為老師所遣不知其入都城所營何事聞其挂錫順城門外千佛菴中足下當請至衙齋齋之并訊其事儻彼業已完所事上山須留之候得種種回書并向所托足下事體及今書中所事一一附報不肖向禮部復疏不委都察院曾行五城并在撫按否儻五城有告示乞抄以寄我再刻經劄付此時或可舉行當請王公錫商之或求臺老一言以致宗伯祠部或但公錫懇之李棠軒宗伯時節因緣不可失況文劄祠部俱已現成而祠部令兄且轉銓屬則臺老一言及之易易耳足下其圖之此為一則切要公案無忽無忽張梅村居士老成練達向同臺老商議請來長安且將為五臺之遊也今臺老轉銓部則此約孤矣梅村公想寓臺老衙中足下須請過齋中一敘更須時時往反以請教義倉之事此公即東禪義倉主人也龍華慈壽碧雲諸名藍大剎須更得足下陪之一遊禮可乎樂子晉南行否諸記文皆就草否淨因龍泉二記曾達之臺老否如其忙冗姑且遲遲臺老于恤審之事已究竟否李見羅公畢竟得與蒙欽恤否諸百幸一一裁寄慈航兄以報我劄付事上官若舉行亦須令人請錢先生一面令其見祠祭司僧道科寫劄須要全云申文及後要云右劄付妙德菴某人準此無劄付都綱司此得錢先生圖之足矣與盧晉明居士形聲暌絶忽焉三載心光昭緝猶夫一日居士學術有源坐忘無怠想于道也其庶幾乎不委何時得覿面恣陳共質水乳徐孺東先生為吾都賢豪長者有幼郎年可出就外傅苦無可為之因親貧道重以法道知己敢為告之居士孺東先生之于郎君蓋不獨以兩聯四比望其勢耀家聲已耳居士不輕幼學慨然就之行且為孔釋兩門植一嘉種是未可知矧孺東先生人品學術亦吾輩所當同心斷金以白首者也惟居士念之儻遠遊未便即挈家以赴尤孺東先生至願也與琅琊空不空居士貧衲暫寓檇李楞嚴偶松陵方幼輿自五茸康孟修家過我攜居士所批史纂左編及拈頌佛祖偈語在篋因發視之不謂斯世既無釋迦馬祖而有淨名龐蘊者出是真所謂豪傑之士無文王猶興也羡羡第云欲刻此流布竊為居士不可蓋居士才吞一口毒氣入肚手舞足蹈命尚未盡安可即纂墓志碑銘又如世嬰孩語尚未正安得記之左史古人道潛行密用如愚若魯又云相續也大難今居士雖具此見解尚不無可商略處在又且二六時中果能相續否於塵境中果無異醒時受用否忽然猛虎踞頂飛劍臨頭果不眨眼定動否即能如是去佛尚遙其或未然且自保任古人有言參學不可不急性出世不可不持重大都先德出處必不違時節因緣有以哉大師臨別示偈附上願過一目潛行密用道階梯才露聰明早自欺醒處未能違現行夢中安得不昏迷與吳康虞居士海內仍凶而臺山數年獨兆豐慶始創道場良為一助且厚賴文殊菩薩慈光照攝叢林海衆亦頗安居未審居士年來蹤迹何在治生産業何如己躬下事少分親切否人身難得中國難生善知識難事事善知識苟非驅情刳識未有不作打罵會者惟脫體當前赤心片片則自足以擔荷承受諦觀足下似以夙因信根少具而又聰穎優間第于野朴真醇則獨居其劣惟足下損其所重益其所輕熟其所無生其所有則于事善知識何有豈曰事之云乎行且與之同一鼻孔出氣同一眼睛觀色同一舌根談論非分外也而況復於種種贊歎怒罵廣作分別而問有過無過耶惟居士勉之與威縣尹默齋居士水月交光針石相引機感以之此不惟世間萬有即欲成就阿耨多羅三藐三菩提法亦未有不由機感資熏而然者近以陳明府舊識策杖貴邑因不欲以納縷奔謁薦紳長者類世之要求者所為且纍明府以故親稟靈山付屬為法金湯如居士者概亦未得覿面一傾雅抱此誠機感之未通者也乃鳴川上人入山報言居士業已于刻藏因緣雅有深心是又格外相薦有不履機感蹊徑在者古人傾蓋擊目千載之下豔口不窮今迹未接而神已交所謂叔世古道良一見之居士乎塵途汩擾火宅瀰漫青山白雲足生幽想不委居士亦曾策念杖履煙霞共幽人逸士汲泉煮茗坐石談玄以暢生平否也泥塗逸翮火宅芙蕖此又貧道所深有願望于居士唯居士念之楞嚴圓覺維摩三法寶附供清玩與曲陽鮑明府惟門下妙稟休明繽纕蘭芷負豪傑之才蒞紏紛之會平明之頌業已于道路口碑載之而不佞開猥以刻藏之舉投錫巖阿升沈異轍竟末由一挹荊州丰采然春風施暢德潤宣流即幽壑枯殘亦蒙霑拂且知向榮生色矣古德謂本光昭緝固不在形聲暌即間而傾蓋擊目猶為滯礙有旨哉其言之乎乃先得此心之同然者也康虞尺一乃春間走力江南時附至者沈滯魚鴻不無罪戾第以山林廊廟卒無便郵而康虞寄言不佞亦且有無妨蚤莫投之之語也謹馳上兼勒此以請疏慢之失與包淡然居士別來如昨時序忽已逾周信世相空華人生能幾想門下信根深厚慧力堅強晨夕之間端能以出世為懷固非世夢塵樊所能昏繫者也刻藏之舉建期五臺幸賴諸佛菩薩慈光照攝及諸長者居士願力護持雖海內仍凶而五臺左右迭見豐稔第恐貧衲福德綿微行業輕鮮不足以戴斯恩眷耳此貧衲蚤莫是懼門下有福人肯時垂一念以策及林泉否乎刻工數十輩日事鋟梓嘉興己丑檀資其登木者十八九業已刷樣齎送覽矣楞嚴道場近作何狀蓋必軒節常臨則諸天魔自無其便以故靈山付囑厥有攸存惟門下念之曇生師行附此并候起居不悉瑣瑣與盧思齋總戎貧衲方外人當無情見然每憶念門下握手別時悽然顏色至今尚不忘肉骨愛我門下文武丈夫今古豪傑而當路中竟無知己者海濱數載寥寥可裂肝膽貧衲於縉紳先生相知者雖嘗嘖嘖口吻舉揚門下操履及所以真慈愛物亦竟無有以報我者世道若此不重可太息耶雖然位高者身危外重者內輕貧衲又為門下有慶幸者在也古德有言既做世間第一等人又當做出世間第一等人門下起布衣爵位若是聲譽若是子女玉帛若是蓋所願亦足矣而生死事正當究念不然恐他日不能挾爵位聲譽子女玉帛敵無常業也門下高識素念及此敢吐心膽儻能於急流中勇退又豈不傑然出世大丈夫哉是望與包瑞溪學憲連日冗迫無暇一走領教誨聞門下近日受侮群小乃固欲與之校白貧衲竊謂大都事不惟其迹惟其心不求在人求在我使在我者果昭然無愧此中則彼之來也浮雲太虛而我之受也太虛浮雲太虛安與浮雲質顯晦哉使在我者果有所委曲於其間則以方便心行方便事而是侮也固我所甘心焉者夫復何校一校則成吾過矣且堪忍界內末法世中正少陵長賤挾貴弱制強時也苟非願力大士入類隨流幾何不行荊棘而坐針氈諦審思惟但當勇雄奮迅捩轉鼻孔早急回頭脫此熱惱趣彼清涼又安可與此瑣瑣輩校是非論長短而造業中業也門下年登半百世味甜苦亦既備嘗啐地掀翻惟在今日門下多交遊恐未有以此逆情語告者貧衲託愛諒口欲含而復吐惟重負門下愛諒是懼儻出格垂采則不負之功實門下之賜矣覲西如師索書六不齋自責語敘不佞以刻藏因緣幻寓五臺之妙德菴己丑春覲西如師至自武林幻豫本兄留之度夏師以故習善岐黃術既挂搭遂以藥王之心運普賢之行尊卑一視疏戚等觀于諸疾病親為調煮見呻吟楚痛者恨不以身識代受即寒暑蚤莫急遽頻繁無倦色無惰情蓋誠意在藥先慈流物表以故有不投投之必應而沉痾者且十起八九故雖工商傭賃輩少有違和亦靡不引領而呼瞻顏而泣雖孩提父母大旱雲霓未足為喻也庚寅秋將飛錫南還乃索六不齋自責語為別不佞因謂之曰藥不必參苓芪朮適病者良此不佞榮衛俱虛膏肓積痼法身潦倒慧命希微故爾金石寒溫甘辛燥濕合劑而用意者其未必有當乎吾師且也吾師妙稟休明元辰獨王大強精進實腹虛心或亦無事乎此也雖然五大封區四蘊宅處忽焉念起六道顛迷瞥爾情生萬劫瞑眩違時失候夫孰無之今以不佞診視吾師大都識慮殷勤意言周悉隨方觸處悅可人情所謂一鄉皆好之者非耶吾懼夫外密者中離人全者天喪辟之表實裏必虛肉肥脈必病也吾師其知所以自藥乎哉師曰聞命矣非仁者其孰能藥我至此此誠所謂急治其標敢復諱忌第恐標差而根本隨之則六不齋所以代為衆生發藥者尤未可緩也幸仁者無厚吝焉不佞無復辭遂走筆如左與陳代州居士本山都綱歷任未久其為人亦頗廉謹近聞有訟之開府者業已批發該縣誠所謂雀無角而穿屋鼠無牙而穿墉不委門下肯過聽不佞垂一語以救援之否諸君子素能出長技以傾危上之人脫當事者不察墮其術中則此嘻噬之凶將不止于都綱一人已耳惟門下念之察之復稽將軍伏惟門下自專閫以來貧道以株坐寒巖蠹剔龍藏以故未得詣轅門而請益望軒節以論心歉也何如眷言孔棘向投木李聊獻野私反辱嘉蔬靡殊天味展也鉢羅之實允焉香積之需謹用登嘉未敢稱謝普濟橋碑記義弗可辭容禪悅之暇捉筆以塞尊命不既復罕峰道者貽蘋果此果惟長安豪貴家有之龍門去妙德更在山之深處何從得此物來正所謂仁義盡從貧處斷世情偏向有錢家徹空師十九日歸故廬吾師當一至以送其行亦佛事人情兩宜曲盡幸無以跋涉為勞與馮把總惟門下文武天畀忠勇性成乃天王聖明特為推轂俾門下得以專制一方攄籌九鄙且也方今騎馮陵于西壤山鬼跳梁于巖阿吾知門下斯行是不惟大展生平長驅直搗使寒心群小褫魄上國安堵中原無恙足以仰答分閫之恩而佛菩薩千百年勝道場亦且賴之若泰山磐石而開也厚受海內諸薦紳長者之託株守寒巖校鐫龍藏尤藉以躬逢節鉞之盛親炙山斗之光矣何幸如之不日飛錫燕山取道龍泉端擬拜瞻顏範面請教益不盡欲言與于中甫潤甫伯仲善知識難遇亦難承事故曰遇善知識如盲龜值木滾芥投針事善知識則凡百銼千磨益精益利或呵或罵即以全身擔荷猶恐力有不及況生心分別耶苟但將吾美匡吾惡潤吾情習非善知識也不肖每於老師熱呵痛棒之際類皆當面錯過及後思量徒增愧汗古德云出家乃大丈夫事非將相所能為豈欺我哉山間寫刻人幾五十輩歲得二千金支費檀力未充誠為促迫即欲刪去以當所入然筮事之初聞風而至且皆不遠數千里褁糧跋涉不得不優容嘉納以招徠之也足下出處此去作何狀近來邊鄙頗多事大都馬市之開病逮膏肓即岐黃復起久必難療蓋元精既竭無復可支此有識者不待今日而龜卜之矣仲淳親喪既入土孺東既吊大當休息一番世緣子似皆有宿因非可強勉所貴男子丈夫正宜于此看得破無量劫來一段光明初無得失冤親照天耀地法爾熾然無因一粒米損卻半年糧也近得渠寄札觀之大都襟懷惡惱法友眷屬宜相援拯無坐視之潤甫比來道念何如時藝亦多精進否丈夫家于世出世法中安身立命皆當圖其遠者大者須是徑挺孤露令人可仰而不可親始得彼庸庸步屈無足蹈襲耳叢林百務勞身積几經書困志正當昏擾而興照告行草草不知所云與嘉禾諸文學僧道開白衲暗劣望越北轅苦為諸大方所羈碌碌茲土者越歲崖岸遼絶不得奉諸先生教邇聞諸先生以本寺池塘有閡貴學及縣治連名數十位具揭在縣夫池開自嘉靖辛酉壬戌間於寺無與萬曆七年崔太尊斷案可稽貴郡老少貴賤一一可指示衲一手不能掩其耳目也自壬戌甲子以來邑大夫喬遷者相望諸賢掇巍科取上第者相望視昔蓋較隆焉謂隆於昔而獨損於今必不然矣説者謂此池係貴學乾方過脈既爾則此池之東從駱家橋稍西而北鑿斷數十丈於學尤近比本寺池塘又甚捨其近且甚者而察察於方丈之陂塘是貴教所謂放飯流啜而問無齒決也衲雖鄙而本師設教且專利濟何敢背祖教以毒諸先生諸先生縱大壑當必為吾法護有如佛所付囑而先有礙諸先生是自礙也嗟嗟衲土偶人也雨則歸之土耳諸先生俱良玉抱不世才值此清霽時且將涵養幽潛完滿福德圖不世業而顧肯造此臃腫事耶衲亦竊諒非諸先生意而為媒孽者所中也謹此獻白惟煌照是幸與馮開之居士已下一十八編己亥年酉月望從忍可師伯處得來大乘止觀序海瀛居士想屬筆矣足下入苕當領之付梓人氏脫有萬一未妥更當共討論之務使海瀛居士筆頭上光明足以熏照未來將必有一人兩人焉於此光明中發大信心入此止觀門然後斯文為不徒作不爾則徒文非我教所貴矣成唯識論三月間可完刻亦不可無序昨文卿中甫寄貧衲尺一甚言武林虞德園居士欲與貧衲一見不知貧衲與居士從曠劫來初無間隔亦無背面可得乃今欲面者形骸耳既是法脈中人必有覿面時節敢乞足下代為合掌求其先撰論序以作後日相見香儀聞居士刻意西方此亦堪作往生助行居士文名遍寰宇況法門著作諒其不怠張星嶽居士頗有助緣刻經意足下當乘其熱念如包瑞老故事為定奪之逐年捐資既不苦而積以十年則功勛且多矣舟次草草餘圖便再悉與項東源居士常憶貧衲與先生始晤時以至今日儼一夢頃是光陰迅疾電火奚喻由今日以至此生命終乃至窮劫窮劫盡未來際大約爾爾貧衲固為習使隨順無明忙忙虛度應無出息不知先生於此光陰如何過去若生平未曾有個入頭有些下落於目前眨眼頃剎那際不動絲毫曾無蹉過即諸佛諸祖五千卷七百則皆是剩語何有貧衲喋喋若目前是非憎愛紛然熾然乃至靜鬧間忙非昏即掉子果無明相續生滅曾無間斷則臨命終時決難解脫今生不了來生又不知是橫是豎一墮即千劫萬劫能不自傷貧衲肆筆至此不覺悲哽信知此事終難自期還須自勘先生年幾半百而一切窮通得喪想看破已久獨己分上脫無下落則他生後劫未免如蠅沾唾依舊汩沒向此窠窟裏有在惟先生自勉向自松城返棹取道平湖故未得晤言令郎昨於周氏園中一面觀其氣質學問大都退墮多矣奈何貧衲此行於檀越概不敢奉別亦不敢告期故於先生亦恝然矣惟亮之與張大心居士世有釋迦馬祖即有維摩龐蘊者出今震旦道脈獨痿癖於齊魯間而桂師憨師起而振之居士乃不惜頭目髓腦深心肯願為之佐理此豈於一佛二佛三四五佛而種善根者耶願居士厚自奉重無自負也那羅延窟想已修完資費幾許當以示我令郎業舉事已屬言于比部令誨之渠已荷諾但貧衲行止靡定而令郎得早至長安受貧衲覿面安置為尤妥耳巨巖師居雜華菴否棲禪窟團瓢幸留意餘繼此圖布不悉與王龍池方伯頃者兩居士兩比丘良夜幽談真濁世奇事迄今想像猶清光泠然洗人心目也古德有言靈山一會儼然未散信矣此非山僧之耽戀光景蓋欲一翻提起一翻新令話頭不忘耳不日飛錫臨安擬投骸雙徑天目間江河渺邈會晤何期社稷老成惟為國珍重食時五觀附上又憶昔白下清夜促膝長談私謂毗耶不二以來固不多見豈非夙緣所追耶別後以投迹清涼音問寥闊今春辱使者之命遠至寒山且承毳衣之惠是時貧道以刻經因緣牽遊人間竟虛法愛之深既而聞之令人慚愧無已貧道自念山林朽物何敢荷長者之勤如此感謝無量茲新刻經成者數種謹各具一部計若于册奉塵慧目願機務之餘試一披覽倘或有當于心可以藉慈雲而大施甘澤庶幾徼惠蒼生非小也來都門已旬月未敢以山野溷高明茲當飛錫草率無狀惟以道鑒諒幸甚與傳伯俊居士都城大寺房號之供凡得有力檀越略為噓拂概獲蠲除龍華有房號三間敢乞作一轉語于北城直指使者以無緣之慈施不費之惠則視布金買樹其功德更十倍矣直指曾遊賞龍華有其言之想亦歡喜無吝足下即因緣不熟難乎親授其記當不惜三轉法輪可也與徐太僕近致書山中知門下銓衡明允人情向服斯不獨門下之幸實法道之幸也山林人良用為慰矣王方老之起非有為國之忠見賢之明超常之識者不能也乃聞其有引年之疏家老師深為籌之使其此一出也老成見用君國利賴即法門亦有補焉則出之可也如其但當以高節危行風勵末世則不出亦可也持兩可而猶豫久之遂焚香禱于文殊大士前決其可否乃鬮得出字如是則菩薩智光洞燭于將來者信非常情所可測識而家老師舉之門下門下舉之朝廷亦必有不可思議者在也惟門下不吝八行速其早出斯無負于今日且其精力強王不減少壯者時節因緣有不可失幸留神焉雁平道知門下已屬意矣卜人之事家老師以大方便轉為攝化之方一鄉之人群然歸向即有司薄示懲警亦心服焉政所謂先以定動後以智拔者也願為道珍重相晤在即不盡所懷與王龍池方伯陸太宰倉卒登山時山僧亦從涿鹿石經山追至是以未得走一介為報既與太宰議遣力請會于山中太宰復以老病不任寒不能久淹終止讀來諭悵然自失此作異世緣之語直令人毛骨凜然蓋光陰輪疾身世靡常緣合緣離固皆幻夢苟非陰宇廓徹常光現前遂于此幻夢漫不為之驚心豈有佛性者哉太宰去山亦悵悵謂過此會晤何期三復久焉不能自釋也刻經期以北地緣簿而費倍遷歸于南山僧自陪太宰出山留京師纍月今且奉經板南下亦竟不及振錫晉陽為曹溪一宿之緣其為念當何如耶四方騷動天步多艱秦晉燕趙尤為近輔門下謂此際欲削髮入山付理亂于不聞免如釜魚幕燕豈可得也其有見之言哉江南信多佳山水而兩浙尤甚門下肯以扁舟自渡北略震澤東觀補陀南望天台雁宕西極雙徑天目訪嚴陵之舊勝探寒拾之幽奇則視與繩今日清涼之得也豈不十倍哉門下少與繩陸太宰十餘歲或不難於此吾知江南緇素欣然為門下掃石烹雲者又非清涼地主可同年語也門下其信之否嗣君宰房山上方石經皆蒞其治內而受其金湯之賜京師諸薦紳長者亦多以此賢嗣君然賢之者未必皆樞要不知亦可藉此為嗣君之地乎否也傳曰德不望報公不徼私嗣君亦務其德職其公而已何有于此然山僧于門下有道義私雅故及之經板業已刻十之二皆未得就裝潢呈覽以山中得紙之難故也此去江南則繭楮所自出當為門下圖之清涼近多魔障幸門下不忘付囑善自護持他無所屬望矣與曾舜徵居士山西呂撫臺于初夏巡閲五臺山見林木砍伐之甚赫然斯怒下令繁峙縣查將師子窩鳳林寺等處擬遣師子窩坐砍伐營造鳳林寺等處坐砍伐開墾招詳蒙批概行免釋蓋謂已往姑不究也兼給告示禁約中亦云念事非一朝罪非一人以前罪端姑免究治是此老禁令雖嚴而存心則恕奈何邇者繁峙復為左右近習所中申請重究而撫臺復批雁平道何再虛心研審招解行東路管糧通判白轉行繁峙縣遂仍前擬招申通府通府擬抄招呈道矣夫五臺砍伐之禁實不肖素心然撫臺業已赦除既往而群狡獨欲藉此以傾陷師子鳳林二三名藍是小人道長君子道消法門興廢實此關焉惟門下向撫臺或雁平道作一轉語以斡旋之仍原既往但禁將來斯不墮小人計綱中矣倘于二公素非識荊即求之他相知可也妙德與師子鳳林唇齒叢林故不得不汲汲且五臺砍伐之害在各寺修造有限而商民販賣板木無窮今獨禁僧而置商民于度外誠所謂放飯流啜而問無齒決也此又群狡神通廣大情蔽深扃而院之所未察者也儻屬筆當更以此為首辭事在然眉幸即留念與王宇泰居士本師書經之願蓋三十年矣昔掩關武塘之瓶山曾一語及意他日從事不肖當左右匡弼以承厥志不謂昨冬於貴邑于氏園亭畢是願而江南緇素咸得周旋奔走以奉勝緣獨不肖羈縻北方未得將滴水點墨之命則宿業深重現行乖違所致也其有負本師不既多乎經既成特命果清師兄齎送蘆芽藏之鐵塔中今詣都城鑄造銅函足下當速往平賊門外茶菴中瞻禮之相知者或拉之同往以廣其孝思以拓本師錫類之願可也本師已飛錫鎮州不日欲登覺山繼此或可入清涼矣足下與中甫迷繩為蛇依他遍計一念瞥起萬念紛紜遂于一光中互相背觸如眼妒眼如指疾指是豈惟出世法中無如是事即世法中一非賢人君子之用心矧兩足下同師而有是行徑直欲使盡大地人謗佛法無靈驗謗僧無家法如是謗三寶之罪誠恐兩足下且為大地人受之則豈獨兩足下互相蛇蝎已哉昨在龍華業已洞悉足下之情似少見及乎此而顧有念釋之中甫此誠無間鑊湯中一滴清涼蓋誠能動物先人格言一念真精六種震動吾知中甫當必悟繩非蛇了依他遍計而圓成固有但在足下貴精誠以待倘其才有一念回光便須迎機一接令不至更相離合斯得之矣惟足下勉之長安風景易以溺人身世匪堅一靈扃閉使非此生少有回頭轉腦處則冥迷長夜馳逐三途寧有既耶草草不盡瑣瑣跋某卷死生患難于人亦大矣不知覺範得何三昧而能于鞭笞束縛中飲食談笑縱橫自在又不知強仲得何三昧而能于衆情唾聞諱見之時獨繭足三千里而毫無避忌授持此卷者當自得之若向本序中摸索盡是指蹤畫餅與傳侍御貴治小西天有石經山乃北齊慧思尊者及隋靜琬尊者刻經于石藏之此山山因以名焉山之東西峪各有寺寺皆名雲居故有東西雲居之稱史乘載之詳矣邇來僧無正見魔有巧圖東雲居乃改名觀音西雲居乃改名天寶頃登此山詢得斯事良為錯愕豈有千餘年所寺額一無所稟承而輒擅改之乎然姑念改之人既徂化而繼之者又愚昧無知事難究而情可原特為改書仍舊額敢徼寵門下并藉尊銜同為立石既徵且尊則斯善也殆信從之者衆矣兩寺更祈各給告示一紙以飭僧行以禁邪教庶魔佛分而邪正辨斯不獨金湯佛道實陰翊王化之一機也惟門下念之與房山王明府惟門下妙稟休明繽纕蘭芷惠風披渥人意消野人雖未識荊然幸于尊公拓方外之雅數載論心意言攸愜故于門下心光昭緝識地趣承亦且數載信矣夫道合神交千載符契固不在形迹疏比間也野人枯坐五臺久逃塵俗邇者偶同二三薦紳中貴奉本師達觀尊者來探小西天上方諸勝睹小西天石經山雷音洞地面殘缺因布金令住持修補之忽于地中得石函函面有大隋大業年間字刻中藏佛舍利三粒靈骨附焉中貴歸奏慈聖皇太后旋遣中使迎入供養本師謂此舍利乃名山奇瑞也特命不佞偕往密為完壁計茲同使臣過貴治敢勒八行報左右儻不以世俗為障一至瞻禮他日報之尊公亦足以見不佞以法供養之念矣且我佛于金河顧命大般涅槃火浴得舍利八萬有奇其流傳震旦者十有九粒此其三也自隋迄今千有餘歲而靈光特耀豈非門下仁心善政和風甘雨有以感之耶不爾非百川澄湛月不現也矧石經山為國家大福地北齊慧思尊者刻藏于石以壽佛慧命隋靜琬繼之至元慧月終焉歷歲久如初未嘗蒞兵燹之厄此固神物呵衛而要之宰是邦者亦多受靈山付囑而來其檀護之功不可誣也然則今日為名山作金湯為國家祈福澤寧不于門下有厚望哉草率具陳不盡欲吐與某足下豪爽揮斤于渚詩酒文章風流富貴一切世味亦既備嘗即蕭韓石范盡是鏡象空花海漚陽焰瞬息不存徒增結業人間樂促地獄苦長願足下圖之此亦信知鼓瑟齊門然終不敢舍瑟而從人所好也至若惡業有十而口居其四足下大都犯之繼此猶當重戒傅大士何時西去去後有音耗相聞否足下業已移家至聊城否晤言有期呵凍不既所欲與傳侍御正月十五日附書于中甫致門下草一日接中甫八行云十一日已出都門凡不肖與門下往來音問皆屬曾司馬為之轉移書至都城想曾司馬當為致之矣中甫使至兼以門下兩尺牘見示始知門下疏已及都門甚為歡喜大丈夫既不能展其所學為斯世斯民免飢溺出水火則笑談山水揮斤煙霞以遂其高亦人生樂事況垂老之親所當奉歡菽水窮劫之我所當究竟頭面而可不于此時決去就乎第聞竟告休致則恐又拂人情而來物議此何時也功名富貴不啻若蛾燈蠶繭寧喪其軀無寧捨離安有御史而告休致者小年不及大年亦無怪其然疏草及旨意皆未得入目不委云何但據不肖妄意揣度此時舉動大都非陳情則稱疾斯合世調之二者而稱疾為尤順也門下其裁之五臺因緣他盡可緩獨申文一節必得批行立石斯為至要全美即門下歸速不及立石而有按院批申立案該道府州縣亦足以為後日張本也近者告開墾升糧者紛紛為害甚切肌骨過此則蔓難圖矣張兵臬甚仁慈敏慧第其有屯荒蓄賑之令而下官多奉行太過亦難可辨察苟有以通其情及示以禁山不可概開僧地既有額免不應為豪民所中而輒升其糧則此公必豁然大悟而名山受福多矣儻有司有所紏劾于僧或貪或淫有實迹可據者亦應盡法不必姑惜治吏胥商民以護名山治穢惡僧人以服有司斯法公情允人無得而議矣華嚴合論之刻門下既有歸志宜暫停止吳甘二老皆非歸信法門一時人情強勉終非美事我教以自發肯心為殊勝善緣無強況門下今日行事尤宜慎約世態雲雨自古然矣萬一二老有心念及則當報以此書刻于五臺聚資于曾司馬而貯之龍華蓋不肖此去住迹京都時少事非可委之他人故未可刻之都城至云委之地方官則尤萬無是理二老若不念及只合舍此而圖大事蓋此緣當日獨為二老唱故也聞憨師有書致門下料必及五臺蘆芽師去山已久恐有所籌慮或未必時宜凡百當以不肖所云為準彼不足馮也況妙憨二師皆注念塔院寺而不知此時塔院大非昔比護之恐反損光明耳近知老師過冬蘆芽或不無所囑纍亦當觀其時節因緣以為行止蓋老師佛祖肚腸而衆生巧于投抵且左右無明眼護惜凡百在門下主張必期世出世法兩無傷損若虧其一必喪其兩一時之情不必盡徇我輩于老師處當大家愛護縱一時少有違拂而要之到結角處終自光明透露矣不肖二月盡出足三月猶往來五臺蘆芽兩山間尚可蹤迹門下儻以此時東歸當于便地相期一晤過此則不肖由燕都牢盛復過東昌一敘乃去江南亦可也又不然則自江南歸錫五臺取道東昌一晤亦可也大都門下行期必于何時以不肖愚慮似惟早一日為得矣聞官舍無內典謹以圓覺經起信論永嘉集宗門武庫成道記各一册附往幸於宗門武庫永嘉集二書更宜多著精彩古人有一生坐臥經藉邊未嘗得一字一義受用偶因謫竄海島于破寺蓊虀堆頭拾得半部楞嚴遂得大受用證入首楞嚴三昧因著論辟之富家兒終日靠米囤而不得餐享米味何以故飽雜味故窮漢得升合便事炊煮恣情享納飽齁齁地去也門下此時正窮乏飢餓中米至須趁時恣意一飽望望又即日曾司馬使者報言不肖正月十五日寄門下書業已託甘直指轉上不肖甚危之此書得從承差人附往即無慮儻官封發鋪而門下又不投文此必類收憲司且將投之新院矣書中所云五臺因緣甚絡索兼有申草在內脫投之新院奈何不肖已趣使都城訊其事圖止之復顓人白之門下乞留意查之凡甘關院公文至得盡收拆乃可不然則狼藉不少矣大都中甫出都門便有如許淆訛也五臺事節正月草四日寄書雖復云及即不詳矣正月十五日書并重録申草呈上幸委悉之他餘皆在緩急間獨申文一節僧司業已候之門墻萬一可行乞批發以了彼我一番心願而名山有幸萬萬不可幸垂一語微示去役令其歸山去役依不肖最久頗伶俐能領會也從甘使者寄書儻已達彼岸幸慰我報音代張中貴作戒文弟子張進自思根器下劣習染卑庸雖得人身而宮闈是近雖生中國而佛法緣疏是以境日侵而染逾深性日迷而情益熾驕奢縱恣弱懦愚癡不知苦之將長自謂樂之無極萬曆丁亥春幸得瞻禮達觀尊者于明因寺片言開示即戒葷酒甫及三年一朝破毀業重障深魔強正弱今幸尊者飛錫潭柘山重復警策惶愧無地痛淚悲泣因自思惟五戒不持人天路絶縱不能全受敢不分持是以發心重戒酒肉誓盡今生決無毀犯又思殺生乃飲酒食肉根本本之不除枝葉寧瘁是以發心戒殺生靈誓盡今生永無故犯惟此二戒實蒙尊者哀憐提拔實亦自發肯心命根可斷此戒不毀惟願釋迦如來觀世音菩薩并韋馱天將護戒善神潭柘山一切護法靈聰加被于我護念于我使我戒力如須彌山王永無搖動弟子張進不勝哀懇惟願證盟重修稽古寺記完邑西北去治二十里而遙為陳候村村有寺建自唐開元間始名寄骨迄我明景泰中檀越靳君馬君再三舉廢墜易名稽古而世俗則亦有仍村名而以陳候呼者然義各有攸據碑幢舊志載之詳矣寺近復頽蠹蘭宇僧伽一時為之消索而中巖居師受業其地乃矢力事修葺天王伽藍祖師三殿業告成功已復集緇素檀物詣京師印造大藏六百七十八函事聞聖天子特賜敕護持之茲且從事佛殿兼創閣以庇法藏會余由燕山入清涼取道謁師師因屬一言徼惠檀越余曰檀之義大矣哉雜華經載初地菩薩修檀度證入二地其曰菩薩以種種所有乃至頭目髓腦國城眷屬不見有施者受者及所施物是名三輪空寂名修檀波羅密由是觀之則金剛經所稱七寶滿三千大千世界持用布施不如受持金剛經四句偈等所得福德多殆與此意互相發明何也必能受持金剛經四句偈等而後謂之三輪空必能修三輪空檀而後謂之善受持金剛經四句偈等蓋金剛經非揀布施揀住相布施也住相布施即七寶滿三千大千世界非雜華輪空檀其得福之寡也固宜不住相布施即布施非布施是名布施斯雜華義也此一舉也吾知吾師行將導完之善信由斯檀度了知一切行度乃至盡十方三世萬有諸法悉皆令入薩婆若海而大莊嚴之豈獨為一區區稽古云乎哉完之善信固自各各具有如來智慧福相者又奚俟夫余言與真實居士已下八編辛丑年正月虞山錢牧翁發來刻入金山道場向非靜圓師幾復草莽矣磨涅始見堅白霜雪始信松筠足下當更護持之顯親鄰巨室必得柔和戒德者居之此地始為三寶有不然以苕人之刁強強孰勝之以苕人之吹求疵孰掩之不惟失其道場辱及僧類即足下護法之名亦從此掃地矣大都作事宜公不得私所好江南之廣豈遽無僧願足下語之靜師期無相負又光陰轉眼己分上事可有多少下落否日用可覺日有光明否學途中日有進益無謂未得一跌粉碎遂甘心醉夢過了現前光陰也仲淳可得共朝夕否世出世法幸相與有成子晉病恙何如便當報我靜圓師在金山有無緩急乞留念又潤州鶴林寺為玄素禪師道場有蓮池竹院皆為人所侵陸太宰力復之有田亦為千兵人家所有前丹徒令馬君斷歸寺近千兵假以軍衛具告屯院批高二府反斷與侵者而僧亦復具告江院批張明府冬底不肖在當湖乞太宰書與張明府明府業已領略不謂張君近復有更調消息漫不視事敢乞足下一言以促之使其完結此事新令為汶上人或未必有益于僧即難為通情耳高二府儻素相識并乞一言以辨其偏執之情如不相知乞發數字懇工部崔君一書乃妙崔君與高至親故也太宰前與張書中亦云同足下作鶴林檀越其中委悉須細訊之鶴林寺僧有得之矣與某汪陳兩居士每以舌相抵牾然舌心使也余甚不樂兩居士有此鄙人兩以善言私相攝規又以惡口警折之然終不能革其流習亦曾示之傅直指直指為兩君掩惡直指既宦遊此一段因緣足下當默致調燮必使和美適人口頰乃可此但與足下道也覽既屬之火光三昧與某別至清涼於最幽深處禁足禁語冰雪封埋人鳥絶迹移步即當穴冰雪為竇日煨榾柮煮燕麥或焚柏子瞑目跏趺時忽身世都遺證入三昧甚之忘失旦莫者十恆八九間遙念諸君子輪蹄逐逐風塵雖欲於此三昧中受用剎那光景輒不易得矣與陸太宰切惟名山藏幽合抱爭秀高士嘉遁寒穴流和邇來五峰競禿萬木空聞釋子逋逃徵糧荒瘠於是輒申蟣虱之痛剖狗馬之情敢乞曲賜弘慈委成衆妙片言之下轉凍為春枯杌重榮亡僧知返俾又金地庶使文殊不乏靈花之圃均提仍備慧水之儔雲外來賓林間得主張相國振頽風於趙宋陸太宰啓法運於明朝一舉玄謨千秋芳響此而不計餘則奚圖且地鄰紫塞跳梁林木崢嶸風鳴葉吼賊以為兵仗巖藪幹舞枝搖訝認戈矛既進施退是以苻堅敗績草木皆為晉兵豈八公之神巧驚勍敵哉實乃茂林助險絶壑資危故也山野本方外之曹與世淡然無接尚慮及此況明公原國家宰輔先朝老成此而弗憂信非丹悃山野不揣暗短無狀獻言伏惟赦其狂狷憫其為法俯察微誠不勝感激之至跋持準提陀羅尼福用解客有疑持準提陀羅尼福聚神用無徵者瞿元立氏乃為之解蓋有法爾報合之辨以夫人昧法爾則滯福用而狂求昧報合則撥福用而妄作而不知自佛以至衆生自佛界以至衆生界孰非此陀羅尼為之總持又孰非此陀羅尼為之出生故受持者知法爾則心佛衆生三無差別而謦咳彈指風動水流皆已具足福用孰謂其無徵知報合則心佛衆生森然萬狀而報之勝劣實持之純駁為之殆無毫爽孰謂其無徵知法爾報合則不移跬步遍歷道場知報合法爾則萬德炳巖了無一法又孰謂其無徵也嗟乎是解出則凡欲由一切陀羅尼門趣無上等覺者信猶執指南適殊方而無泣岐不獨一準提陀羅尼爾已萬曆丙戌春余杖錫至燕都元立氏持是解質余余讀之躍然肯首明年秋元立氏捐俸梓成佛心要集於龍華方丈戊子春告成工會余復至自清涼遂從臾之附刻以嘉惠末學誠有因是解而信受此陀羅尼直截相應了無疑礙則豈惟元立氏所解殿公所集即釋迦所説乃至一切若顯若密皆長語矣五臺山古師子窩釋道開跋明優婆夷薛氏塔銘此優婆夷薛氏塔也是塔之建亦既平地起骨堆而余復銘之又何異鉢盂安柄雖然無奈呼馬呼牛未免將錯就錯銘曰天目之山有靈物焉東奔入海波湧雲駢苕霅兩軍善能柔敵直截剛強頽然兀立聳若圍城人因以名有菴清涼儲釋之英有女丈夫跏趺示寂遺命五子龕之禪室鑊湯甘露火宅青蓮香風周匝熏拂人天吳山師子千年絶響此日其誰嚬呻相望寒潭空影幽谷希聲斯塔斯菴其永勿崩示寂先師楞嚴寺住持了然和尚行狀先師法諱能弘字了然一字休休嘉興縣王店鎮欣氏子父某母某氏以嘉靖癸卯十月十日舉先師年十三四即不樂處俗里有菴為杭州靈隱寺下院有僧居之先師見輒喜數往焉尋乞身父母詣菴披剃二十人講席習經論以資弗逮人殫心竭思功視人恆有倍由是講業日精學輩就質疑義者日益衆先師亦誨人徹旦夕無倦隆慶辛未夏月溪座主赴金陵天界寺講期先師為副講值歲凶饘粥不能繼乃倡衆日乞食都城夜則尋討經義天暑弱軀遂困憊成疾忽自歎曰文字語言終非了義因謁棲霞雲谷和尚參趙州無字話間有所發明輒疑不自肯然教乘則日益精徹每至叢林提一經一論為四衆開演直截明快有非尋常講者所能及雲谷和尚晚年歸錫武塘大雲寺先師居首座寮身心勞悴病益進由是始決策終老泉石間矣萬曆戊寅掩關武林高亭山壬午移關于嘉興之東塔癸未不肖以達觀老師命有事楞嚴亦駐錫東塔一日達觀老師至茶話及德山托鉢因緣先師未暢達觀老師以偈進之曰托鉢因緣不甚難耳邊密啓即幽關先師疑益甚乙酉楞嚴復郡邑大夫議檄先師住持請于按院范公兵道曹公咸報可先師強起應命居無何復掩關東靜室丙戌春不肖遊燕京明年冬登臺山禁足龍翻石期百日甫越月一夕夢落五齒吐掌上血迹宛然越日先師書至諄諄誨言無以己見為通方塵勞為妙用且自通其所得于托鉢因緣者併致書達觀老師請印決時達觀老師飛錫蘆芽蘆芽距五臺五百里卒無便郵可寄不肖仰據先師所見遂先報書蓋當仁不敢讓也又明年八月不肖自五臺南來至聊城見吳康虞居士寄曹林師兄尺一附言楞嚴了然關主已于四月二十一日化去嗚呼痛哉先師傾心教海而不受其沉溺乃于大事因緣方期此生取辦奈何天遽奪之使其抱志以沒嗚呼痛哉先是萬曆辛巳秋不肖自高亭披剃已從先師結冬大雪偶達觀老師過大雲才一瞻禮而不肖平生惡知見悉于其眉睫間消鑠殆盡自是不肖日親稟達觀老師而先師輒私喜謂不肖曰達觀師真善知識若得親事之誠幸矣奈何我以疾病暫阻咨參然不肖每自達觀老師所來必備訊所聞而後已是先師于達觀老師迹雖友而心實師之故臨終呼達觀師其垂光攝受我乎如是者三四時達觀老師結夏靈巖一夕夢二幢離崩一倒于南一倒于北次日不肖遂以五臺山無邊老師并先師訃告蓋無邊于是年閏六月化時亦以不獲盡曲折于達觀老師為懷噫諸老宿一念感通千里靡間真有如水月相為映射者獨恨不肖于先師既缺巾瓶侍奉于平時而臨沒又不及請一言為終身佩披剃之恩其何為報今同法兄仁慶等謹奉靈骨塔于楞嚴方丈後因托其生平大略具狀仁者乞垂一語勒之貞石為末世叢林光幸無恪焉不肖不勝哀懇之至密藏禪師遺稿後跋我紫柏尊者有徒七人焉一密藏祖二幻豫祖三寒灰祖四幻居祖五淡居祖六洞聞祖七慈音祖其擔荷翻刻大藏經者惟密祖與幻豫祖也恢復化城中興刻藏者乃淡祖也幻居寒灰二祖者贊襄刻藏者也洞祖不預焉慈祖無聞也密祖有徒焉乃念雲翁也念翁纘祖父之志續刻未刻之經司掌經坊吳江開建禪林接待往來雲水二時茶飯精嚴天下禪流稱頌此真誠實行菩薩人也念翁有徒焉今我香菴叔也香叔生平無喜怒色無世情態具慈忍心體佛祖意持蓮華經數千餘部寒暑不歇老病堅持此是靈山會中曾受佛記弟子者也香叔有徒焉乃明一兄也明兄蚤厭世途長臥而逝明兄有徒焉今吾按指穎姪是也維其傑出緇倫注心道法慨祖宗之公案未完收輯密祖遺言廣布擔願了完全藏不謂第六世而有斯人願來繩繩而無盡我本樵採之人愧無文字可贈但直敘其枝分源派而已以示將來法屬咸知刻藏相承之脈若一微塵內流出大千經卷半滿科中現起無位真人則在讀是書者當機領略云爾順治己亥季春望日紫柏五世法嗣解印敬述遺稿始末略言契穎嘗讀古傳記授受中間未有冥通如密祖之與穎之緣奇也穎年十六幸嗣祖派知祖矢刻書册藏板流通而功未竣飄然往矣惜其遺稿諸篇湮沒無傳心甚悲之丁丑歲杪謁巾石師座側見祖親書誓刻大藏願文一手卷固請至再乃得歸焉然亦僅得其一聞遺稿向為介生翁祕笥中後介翁卓錫凌霄歲戊寅往謁之叩示跪讀具見吾祖之矢願宏深裨益大法豈細也哉穎因固請珍祕不與許穎祝髮後力能勝此斯不虛所授求之不獲鬱鬱而歸庚辛兩歲薦飢介翁拽笻去矣後聞奄謝吳門故物散佚耿懷彌切壬辰冬走虞山與澄如法兄促膝論心情甚歡洽語及遺稿不復再睹為悵澄曰無憂介嘗授我今以授爾可乎穎之驚喜出自意外拜受而歸噫是非祖願神護何以隱而復現俾穎既得其一復得其一也又得牙篆一方乃祖諱章也亦名手所鐫捧持祕重時癸巳中秋日也若楞嚴寺規約并禪堂規制俱出祖心裁製復從徹微老宿處得之斯真祖靈有屬大願欲成故種種法言萃于一時每於無意中作有意之合於難得間啓必得之緣不知造物與之歟抑精誠合之歟固不憚炎霜將所得文言敬壽諸梓以廣其傳惟諸高賢覽是刻者知穎之志願之誠特符祖意之神護不沒也時順治戊戌菊月望日五世孫契穎謹識楞嚴寺規制敘密藏大師鴻飛冥冥已七十夏星白矣法門有想望其風采者不知無位真人出沒於何剎海忽今秋徑山璉珠菴五世孫按指穎上人於故老處得其祖之法門遺編復於老僧處得其祖之楞嚴規制因丹山居士屬余一言以刻行之先既序其遺編茲應序其規制庶使此希世神奇以成拱壁天下後世共得親見大師生面敦教育於春風化日中凜鍵鎚於迅雷激電下法乳之施不廣遠乎或曰此規但於楞嚴尚未可盡行而何足以曲盡諸方之叢社乎余笑曰此一曲之見也此規又何必楞嚴之能行不能行推此大法為公之關捩子於種種堂規凡例即參於百丈清規與尊正規鑒中又何加損之有哉凡有叢林無叢林但是單丁住山曠蕩行腳有此一册隨身自律便足以律衆於人天也此豈法門之小補哉乃為之序云戊戌季秋望日臬亭浪杖人道盛題密藏禪師定制楞嚴寺規約五世孫契穎較梓楞嚴寺建自宋嘉祐間為浙西名剎禪講高流多駐錫焉入國朝尤與精嚴諸名藍比肩稱盛迄嘉靖辛酉廢為巨室別業萬曆己卯郡守金溪黃公以寺居郡治之乾邑治之艮寺廢則乾艮頽陷乃力請于按院淄川王公兵道無錫張公議復之越四載癸未復有規取其地者郡守龔公嘉興顧侯秀水陳侯堅持不可遂復上之按院范公兵道曹公而鄉達大司空五臺陸公學憲瑞溪包公鄉進士袁公坤儀太史馮公開之相與捐資協力始得盡歸故地此豈非伽藍神之默護而一時宰官居士乘運挺生共興佛事哉大司空以殿宇工繁未易卒舉因買施廳堂房屋六十餘間先造方丈禪堂屬道開督理工役道開不自揣勉承諸公之命始事于甲申秋七月迄今年春二月禪堂齋廚等室告成方且有事方丈太史謂禪堂既創粗可安僧宜緩方丈而急佛殿夏四月遂命僧乞施郡中甫三月隱隱有響應之機矣會秀水陳侯不祿乃不逞輩藉以興讒中止工役此實道開德臘淺薄願力輕微所致不然何能舉二十餘年之廢墮而遂成功于一旦也道開罪戾誠無以自解敬謝檀越乞食他方殿宇大功俟諸來哲然叢林新設庶事草創非有成規曷能垂遠今定立寺規十條録成一樣十四本方丈禪堂并十二庵各付一本後之居斯地者願共遵守無作虛文分授基地古藂林百千萬指群居共學法固不得自私粒米滴水況有分居析爨如俗諦者哉慨自世降風微法衰道蠹有不居伽藍而恣惰神祠鬼墓旗布星羅以蠶食檀信者矣有雖居伽藍而割井離煙孳畜烹宰有甚于俗民者矣有雖居禪室而務多藏厚積畜子養孫無異于酒肉僧者矣嗟乎狂瀾倒海撮土其何以回之碎膽裂肝強順流習今將本寺基地公私分作一十五分正對城隍廟一分作佛殿天王殿三門雨花閣及東西兩廊基共闊一十六丈深三十四丈殿正東而北一分作方丈及金湯別室般若堂基般若堂藏郡守龔公所書金剛經石刻及各經板共闊十四丈深二十五丈殿正西而北一分作禪堂休夏堂及庫司廚司齋堂旦過堂基共闊十四丈深二十五丈已上皆公所也殿東南方丈前一分作一庵基名妙覺殿西南禪堂前一分作一庵基名等覺各闊十四丈深九丈禪堂西為街街西共地九畝零南界寺墻西北俱至城腳街均分作四庵自東而西第一名法雲庵第二名善慧庵南北各闊十二弓第三名不動庵南北闊二十二弓第四名遠行庵南北闊二十四弓有奇佛殿禪堂後濱北共地十三畝東北俱界寺墻西至城腳街均分作六庵自東而西第一名現前庵第二名難勝庵第三名焰慧庵第四名發光庵南俱闊十一弓三尺北十一弓一尺五寸第五名離垢庵南闊十一弓四尺北十一弓二尺第六名歡喜庵南十二弓北十一弓三尺而池西岸地一帶屬之已上皆私室也其法雲善慧庵後池南弦上地一帶及禪堂後焰慧發光庵前地一帶俱屬禪堂作菜園亦公所也查方丈禪堂及十二庵亡僧俱無葵骨地合將現前或難勝庵基動支禪堂錢糧照叢林舊規造普同塔一座塔院三間聽禪堂撥僧守之其內隙地悉禪堂種菜辦糧各庵不得規取寸尺首僧雜役亦應除免不得攀纍此雖私亦公也再照十二庵基內有未造者禪堂暫管辦糧俟有戒德高流會議與之慎毋徇私比之匪人尤不得借與俗諦中人豎一椽一瓦以啓他釁違此言者永劫沉墮均派糧差觀夫南北叢林中方丈禪堂必有德者居之未有納糧當差者今本寺佛殿方丈禪堂及十二庵共基地四十一畝一分五釐四毫議除方丈禪堂外止應十二庵照依精嚴故事無論本庵地之多寡均派糧差每庵三畝四分五釐各自辦納但永不得分戶及將地畝割寄俗戶以貽後患違者衆當協力救正甚則告官懲處不得隱忍其遇造册及糧里幫貼使用亦十二庵均派儻有大德地主矜憐曲護得蠲免佛殿方丈禪堂公占如他名剎尤幸事也余日望之朔望祝延我釋子不耕而食不織而衣粒米寸絲恩有所自苟非大事究竟如之何其坐受之故祝延一事實報恩重務也每月朔望應照各大剎上殿稱祝方丈禪堂僧畢集十二庵各以首僧一人至違者罰香十束油十斤供佛二次罰銀一兩作修造之費二次則會衆擯出其庵另請僧居之所有祝延香燭并衆僧清茶一杯十二庵逐月輪供今佛殿未造暫在禪堂祈祝各庵免至官府支應昔法道盛時龍象傑出王臣每敬禮之恐後今也糧差正供外追呼征索下同胥吏此豈盡王臣之過哉實我輩不修梵行自入卑賤致之也凡迎接祈禱一應雜役本寺諒亦不免除塔院係禪堂管理辦糧雜役應免外議十一庵輪年或輪月充首僧支理今庵居未經造完已造者先儘輪充永不得干涉方丈禪堂方丈住持奧稽我釋迦如來之住持五印土也四十九年三百餘會邈乎不可尚己嗣是達磨東來住持震旦九年熊耳五葉芬芳智者之天台觀師之清涼繼嗣亦各有人庶幾皆無忝住持之義于是叢林之興在禪曰方丈在講曰法堂住持者在禪曰堂頭在講曰座主曰上堂曰升座此又禪講説法之所由分也考之六朝唐宋盛時逮我太祖成祖以至弘正間凡住持者皆有司致敬敦請相與表裏匡扶化道嘉隆以來各寺類以本山酒肉僧輪充住持且指實行禪者本色道人及諸方參遊衲子為野和尚嗟乎為佛子者寧甘心若所為家和尚哉昔也敦請而至今則牒劄而驅昔也捧喝上堂今則杯酒入院昔也利生升座今則自利赴期又何怪乎有司之驅使而奴隸之也本寺方丈之攝雖不能回波泝流上法古昔亦當少匡時斃冀振玄風凡請住持必咨訪他山名德瓢笠高流或能以正知正見開悟一切或能精持靜念鎮攝一切或能堅持淨戒風礪一切無論齒臘高下皆議請之訪議既定禪堂首座維那并本堂主僧即監寺各庵首僧隨力辦具香信兼求金湯書刺擇日請迎至日禪堂設齋禮送入院如地遠者止令禪堂主僧當年首僧齎具衆僧名柬及金湯書刺往迎不得赴官給帖不得設齋慶賀住持亦不得設齋款衆如無名德堪以應請不妨闕席慎無以師子蟲魚貫輪充自食身肉入院之後每月朔望先晚禪堂設茶千栴檀林首座監寺等執香詣方丈恭請茶話茶畢或隨意舉唱或參決心疑或咨請經旨或商略常住事務各庵首僧必至其餘有志參請者聽住持如欲退院禪堂上中下座及本堂主僧各庵首僧再四懇留不可然後于禪堂備齋禮送出院首座有為衆所推仰及前院舉代亦堪補席蓋古有其事也方丈立住持題名碑一座使後之人得指而賢否之此昭勸戒其住持闕席方丈堂舍聽禪堂撥僧守之不許各庵令僧安居以致侵沒常住茶參坐次自昔禪林參堂入室惟立受而已初無坐禮況敢與主法者抗使道法不尊今設茶坐次惟住持一人正坐于上餘皆列坐兩旁自北而南先本堂上中下座次各庵首僧本堂監寺知賓化主又次各庵散衆及本堂典座等一切行人即本堂四首座有耆宿與住持年相若道相似或曾同參共學于此亦當折節贊揚故一佛出世十方諸佛同集道場先輩祖師亦類多隱顯上下互相鼓激無他念也其或未至無學地位更當虛心參學毋自慢高儻缺住持則第一座舉揚參請坐次則堂中四首座上位各庵首僧本堂監寺知賓下位餘盡兩旁序坐叢林賞罰佛律視刑書其詳密不啻萬倍故俗諦中人干冒國憲無或深怪如僧行少虧即不逾時遍人口耳是僧家犯佛律為王章所不科議者最多故持佛律以整肅僧輩實住持之職也本寺凡各庵有事當白當年首僧轉白禪堂首座赴住持聽理如禪堂有事則首座知會首僧赴住持聽理住持缺則首座代理首座并缺則當年首僧鳴板集禪堂監寺等及各庵首僧共赴方丈議處若事情重大即住持首座不缺亦當集衆共議方丈設立二簿注記合寺僧功過有不服公議者連名具呈僧綱司轉聞官府懲治禪堂規則古叢林有明眼者主其席又有第一座贊其化由是諸方參學龍象雲奔霧湧相聚一堂拼命鉗鎚不至發明己事不已充其心即死于凍餓吾寧焉何法道衰而叢林敝祖意微而僧行虧主法者惟利養是圖而號稱粥飯主者亦往往據禪堂為壟斷借長連曲彔木床為利媒依期論價賈集庸材以為奇貨而鑄鬻之期畢則競少爭多作散場公案嗚呼此可為痛哭流涕長太息者也舍是則能持福緣供接往來者為大善知識矣初不知叢林之設為何事又或一瓢一衲萬水千山與先聖賢遺迹作仇讎償路債者為參方之士矣初不知古人三到九上與八十猶行腳者為何事又或有因營修寺院建立講經諷經坐禪念佛期場自謂得方便募化之道殊不知解説為闡明法要讀誦為借熏鈍根參禪為究明心地念佛為求生淨土若營修則自有本分善緣顧可因瑣瑣有為功德而倒行逆施若此也今本寺禪堂永宜痛戒前非務在延請正知正見戒德精嚴者為第一座實心實行勤勞為衆者為主僧每年立二長期四月初一日結夏至八月終解期十月初一日結冬至明年二月終解期蓋古惟坐夏今兼結冬者以近來叢林習便故也舊規上期不過百二十日今百五十日者以近來真參實學每苦根鈍期速功廢半途故也歲闕三月九月者以其時便宜浣葺冬夏衣服故也堂中當遵古法立床曆簿一扇每三月初一日九月初一日出付書記無論他方此界但能真實甘淡泊為生死者即與登簿進堂期內除疾病外決不許起單及告假暫出其修持之法或參禪或念佛或持經咒或習教觀各從其便惟四時止靜二時課佛或課經則衆共之苟有不謀道而謀食不務實而務名冒進此堂即宜擯出即堂內草深一丈應無所徇其禁戒言笑戲爭等項聽第一座隨期立規便宜賞罰堂中飲食惟隨庫司豐儉而致隆殺不應為利養故諂曲求施門庫司蓄有冬夏衣布于立夏前三日合堂內外均給散之禪堂一應銀錢米貯庫司主僧惟董理提調不得擅自私蓄凡主僧不守禪規或徇私謀為及容留不肖僧衆許衆白第一座以理勸戒不改則知會首僧共白方丈更宜擯出不得互相姑息致墜叢林各庵規則僧俗之分不徒以其迹蓋有實存焉乃今住寺分房豈獨盡亡其實抑且并去其迹所存惟剃染而已本寺分居十二所不曰房而曰庵宜取名十地二覺者屬望之意實深且重所願各庵悉照禪堂規約精進修持冀挽頽習不爾亦當無虧戒律無毀規儀不缺二時課程自辦一生事業庶無忝居名藍為佛子至若栽蔥種韭蠶桑孳畜尤本寺昔日傾廢之因切宜重戒常住修造修寺建塔世疇不以有為功德稱之然亦顧主修者何如人耳若為自求人天福報稱之曰有為固宜苟念一切衆生慳貪執重藉此而銷亡其執習又念一切衆生處大火宅中熱惱無告藉此令得寄滴水于佛海作他劫清涼之源又念時當末季像教漸微藉此而扶十二于千百令未來諸衆生見一剎聞一剎入一塔廟一瞻禮一指顧一低頭皆成佛道如是而可謂之有為乎哉故在凡夫則終日靜坐徒增我習在菩薩則一止一作無非妙用奈何今之修造者不惟鮮普賢願行而求報人天者且寡矣故佛亭旗鼓歌舞街衢者有之廣求書刺遍叩豪門者有之入一郡邑至一聚落多方探訪專求善施者有之舍是則或建講經坐禪之期或開念佛誦經之會千奇萬怪簧鼓檀那倒行逆施毀佛規式要之盡非修造本分行門也今本寺置立緣簿四副每副四册自一分至九分為一册自一錢至九錢為一册自一兩至九兩為一册自十兩以上為一册內將一副存本寺收支匱上立二匱主掌之有來寺隨喜者隨緣乞施將三副擇請真實戒行僧分布城邑隨緣乞施無貧富無貴賤無多寡必施而後已有慳結者當為三懇化之無倦即農樵負販發心喜捨少至一錢一縷一粒亦當生恭敬尊重心以受之蓋貧人一錢與百千萬貫等也如是募緣其得雖寡而緣則溥其時雖久而功則堅所收之銀惟貯匱中不得入方丈禪堂及各庵匱上別立收支二簿凡收支銀兩匱主會同禪堂監寺及管工僧三面眼同稱兌登注明白除木石磚瓦灰釘工匠外分毫不得他費亦不得彼此支借以昧因果自沉苦趣其殿宇式樣基址界分俱有定規無擅更易方丈禪堂并各庵不得私自取用寸木片瓦及私役匠作做造家火如有此等管工僧白衆罰銀一兩公用仍罰賠所費工料叮寧告戒之後有故犯者伽藍神其殛之皇明萬曆乙酉冬十一月望日沙門道開識本寺欽蒙慈聖宣文明肅皇太后賜畫像觀音大士一軸紫衣一襲每年十一月十九日恭遇皇太后聖節及今上聖節冬節年節住持當遵奉南京禮部劄付及本府帖文內事理陳像披衣祝賀尋常務要珍藏保護不許披展玩褻如住持闕則禪堂首座代披行禮首座并缺則監寺代披行禮凡住持首座監寺重換須交收明白至囑時皇明萬曆己丑五月朔旦道開續筆密藏禪師楞嚴寺禪堂規約徑山五世孫契穎較梓昔如來應世作大醫王救療衆生良非一味故四十九年惓惓善誘而防非止惡律部獨詳焉逮夫世降風微僧行譾劣由是百丈大師大不獲已曲施俯徇建立清規此又貫高田光之用心也然其周折進退經曲威儀猶有足觀宋程伯子有言三代禮樂在是矣何今也日趨日下愈流愈遠比丘家率以詩文字畫爐香杯茗相高習成逸豫燕安背馳本教而世之所以貴方外交者亦惟此輩而已如是而欲其持佛律奉祖規為七衆瞻依得乎興言及此誠可痛悲略示堂規幸相持守近世修行類曰參禪念佛然參禪念佛非有定時定處一日之間自子至亥皆參禪念佛時也靜鬧間忙皆參禪念佛處也故溈山典座雪峰飯頭黃梅腰石力春白雲身親磨職皆莫不洞徹心宗作後模範凡我同居起居食息俯仰周旋慎毋虛度光陰各顧本參本念先德云一息不在如同死人勉哉二時功課乃叢林舊規一聞報鐘內外盡合隨堂禮誦違者罰跪香一炷惟廚庫各留看守一人及茶頭應免有疾及有公務者亦免叢林飯食粒米滴水義重同餐除打板過堂外有私自飲食及私與者各罰跪香一炷惟客至并有常住公事先出後歸及戒過午食者病者不論酒戒律中甚嚴凡號稱比丘佛子若飲酒者跪香一炷再犯擯出有病服藥及工雇人不論叢林之建為衆參學之地非曰美觀亦非戲謔鬧鬨場也凡有間談雜論者跪香一炷嬉笑及攀肩搭背損失威儀者跪香二炷再犯罰油一斤三犯擯出其罵詈諍鬥者無論是非各跪香二炷罰油一斤再犯擯出戒赴請念經夫佛説一切法本欲衆生聞而思思而修修而證若讀若誦亦不過使劣根人出口入耳文熟義解乃今藉以博身口受用甚至杜撰偈讚歌舞悅人且用角技矜能恬不為恥豈不大悖佛祖意哉即如瑜伽一教彼固自有儀軌真言初未嘗令人念何經亦未嘗令禪者為之古有撥僧應供齋畢轉經亦不過因齋轉經非因經賈利也弊至于今誠可痛憫凡居此堂者決不許赴俗誦經以圖利養違者罰油十斤戒接待女衆夫婦女入寺禮佛固其善心然民風不古謗讟易興而我教往往受斯玷纍不可不戒今縱不能嚴拒其來亦當漸為杜絶之計凡我同居不許以一茶一飯款延婦女及接言談違者即時擯出禪堂內外各不許私收徒弟及披剃違者師徒俱擯倘有在家善人及在寺行人欲請法名者監寺為白首座命之禪堂內外非為常住公務不許私出違者每一宿罰跪香一炷五日以上者擯其有公務及省師省親訊友者須白首座允可立限水牌方出違限者每一日罰跪香一炷十日以上者擯近時海內叢林衰落大都皆以住持不得其人而禪堂內外又賓主太相懸絶在堂內者意不過曰藉衣食以資熏修己耳叢林得失漠不介懷故一飲一食百謝千酬宛然恩出主僧受之分外在堂外者則賴此以便私圖聲價既售利養既歸鮮不畜子養孫親疏爾我其究也不至盡逐高賢不已情深業重伽藍神且厭薄之而叢林之廢可日待不知檀那滴水慘劇洋銅而叢林內外實關一體譬之一夫身心不可岐而二焉者也且今所稱主僧及俗呼當家蓋古監寺職耳首座監寺相與表裏冀贊住持以弘化道分自有差詎容倒置本寺倘缺住持則堂內外事無大小必監寺白首座裁之庶幾其猶心臂指之相使而得免夫內輕外重借公營私之弊乎禪堂立床曆執事二簿凡欲入堂及領執事者必白首座訊其名號鄉族及無忤逆逃叛緣事在官等由然後録草簿登水牌令之安單就職閲旬月察其人果心無外慕與衆和同然後入堂者登床曆簿領執事者登執事簿有不白首座徇私擅留者罰跪香一炷所留人擯去其由堂外執事入堂及堂內出就外職者不必登草簿水牌禪堂立記過簿一扇凡僧行有過每日晚課畢堂內聽維那糾舉堂外聽監寺糾舉俱首座酌量輕重論罰罰畢登注記過簿臨罰抗辨不服者加罰香一炷再不服者擯堂外執事除犯清規立擯外凡無過欲起單者須半月前預白請人替職如滿半月即無人交替聽從起單禪堂立交割題名簿一扇佛像經書器物簿二扇凡交割家務須舊管者或點茶或備齋請住持及堂內外各庵首僧切近檀越眼同將常住佛像經書器物照簿逐一查點交收明白然後題交者收者名于交割簿方丈以下皆書名花押證盟如有缺少須責賠償蓋常住物寧有增無寧有損也倘下手無正職收領聽住持或首座命僧署管署管人亦須題名交割簿常住物不可令一日失守其佛像經書器物簿二扇一存欽賜匣內以立根本一存首座寮以時稽查如有檀越增施佛像經書及賢能主僧新置器物即須添記二簿以聽交割禪堂立經書器物暫時出入簿一扇凡有公事取本堂常住物出外應用及借他寺院物來堂應用即旦夕亦宜登簿以便日逐查銷蓋人命無常呼吸代謝前後失告罪業誰歸其欽賜匣內物尤必首座面衆親手檢查出入不許他人私自啓閉匣上鎖匙須收庫司至祝至祝禪堂立亡僧抄劄簿一扇凡堂內外有僧亡化首座即時集衆抄劄登簿所有衣鉢除量與看病行人外盡須估唱為買棺木及點茶或備齋請衆誦經稱佛津送茶毗以資冥薦如無衣鉢者須常住量力津送亦須記其名號鄉族及化時年月日時此叢林重規不可忽也禪堂雖戒應付誦經倘有檀越就詣本堂禮誦則無可辭之理堂內合輪次撥僧以應如所應撥之僧于檀越所欲誦之經稍不間熟聽首座另撥即抵下次應撥之數也又或檀越意有專指則亦委曲從之其經資無論多寡悉照常規合堂內外三等均分不得私收入己違者罰油五斤禪堂錢糧雖貯庫司而收支簿則堂內書記掌之凡檀那粒米寸絲必入堂白衆登記庫司日逐支用銀錢須録水牌每日晚課畢送書記謄入簿內半月算結一通即暫時賒借亦須白堂登賒借收支簿以便查銷皇明萬曆己丑仲夏朔道開謹白明吳江接待寺監寺前徑山寂照庵司藏念雲勤公塔銘并序維我達觀大師遺讖有怪來雙徑為雙樹貝葉如雲日自屯之句故闍維而建窣堵波則歸骨於鵬摶峰方册以行修多羅則貯板於寂照庵蓋一遵先訓云而大師生緣實在吳江吳江之接待寺尤其所常駐錫地念雲勤公於大師為法孫於雙徑經房吳江接衆皆嘗為主者葬處在徑山黃沙灘左余於兩處皆忝稱外護不能無片言以志其方墳乃序而銘之公諱興勤念雲者其字也俗姓張氏河南之禹州人少失怙恃十六即入清涼山勤行苦行幻余本公見而器之曲為成就既一再往還京師得事密藏開師命今名為弟子然猶未為剃染開師乃大師之得法上首諸法門弘護事皆親承付囑一力擔荷大師欲易梵策為方策以流通大藏開本二公實為領袖時方設刻場於五臺取施資於吳越金錢出納之在南方者余友周季華氏司之而齎持道路者惟公一人蓋為開師所托重如此又以其間隨大師遍謁諸大名山公充前驅先至後息汲泉掃室以息大師之道從其勞瘁亦倍於他人開師隱遁公於大師前落䰂禮別尋師繩橋鳥道無險不經終南峨嵋匡廬衡嶽無幽不歷迄不得師消息蓋行逾萬里期越三年而始返就大師於潭柘俾充都管裨益為多公長身偉貌熱腸直口事所當言即大師室中衆皆屏息者亦陳白無所畏讓既以北地苦寒遷五臺經板於雙徑立為定法山之寂照主收藏禾之楞嚴主流行推公領其事余友周子介氏與共為經紀事事咸理吾邑接待寺地處南北之衝雲水來遊肩摩踵接無邊海公主此禪院願王深廣道行高嚴十方粥飯主人稱為第一萬曆庚戌海公遷化難乎其繼邑諸檀越我沈周兩氏為之倡余家僉憲憲副兩兄輩特禮致公以據其席公鉢無異飯篋無餘衲一心為衆千指稟仰叢林之盛視昔有加邑諸宰官若前趙中丞周冏卿及今呂李兩司馬孫方伯始吳侍御沈儀部輩無不終信嚮之檀施所積凡置常稔田三頃計每日可以一畝之餘粒供衆歲所求者惟果蔬薪炭雜需公亦時或以施資假貸於往來善信取息佐其缺乏或以好利諷之公毅然曰吾不爾者齋廚諸費何來固知公不避殖貨之嫌者正其飯僧深切處也又增置養老堂以居退休則與其法友念光通公協力成之公往執侍大師左右嘗令熟讀永嘉集等未來接待時曾當寒熱交作中夢作諸經頌其頌法華一首云悟佛三乘坐信車利生道行辨龍蛇如獐獨跳蕉芽種蓮葉波心不染沙醒以告人聞者異之及領堂事寒宵暑夜課誦必以身先迄老不怠有關常住細務畢親夙有威望見者自皆畏而服之暮年屢病屢起終不肯以衰憊自佚崇禎戊辰十月二日遂爾長逝世壽七十有一法臘三十有五公素不畜徒晚見一僧朴誠他日可奉香火為命名隆徑而字以香菴立為己嗣黃沙灘有山四十畝售自天然房者俾作塔院恆産今來乞銘者即隆徑是也公歿既從茶毗庚午歸葬山中而碑碣尚虛余從子君善常寄迹禪寮稔公行履為詳余得撮其梗概作為銘詩銘曰紫柏垂芳奕葉有光勤公挺出厥貌堂堂心奉塵剎氣作金湯飯出香廚經藏寶坊淵神篤護歿而不忘孫枝祖蔭趾頂相望敢告山靈環護是鄉彌天法雨永作津梁皇明崇禎六年歲次癸酉中秋之吉弟子隆徑立石賜進士第通奉大夫巡撫山東提督軍務兼理河道營田都察院右副都御史前山東等處承宣布政司左布政加正二品服俸沈珣撰賜進士出身文林郎四川道監察御史欽差提督省直援遼餉務前奉命巡按陝西兼攝三鎮地方吳煥書丹賜進士第中奉大夫浙江等處承宣布政使司右布政使孫枝芳篆額附刻徑山請書徑山興聖寺天下選佛場始而國一欽把牛鼻繩逮於佛日杲作師子吼信為麟鳳飛遊之苑允矣龍象蹴踏之區既去聖遠而邪法興遂當人藏而正宗墜豈期法堂前草深一丈安得寶座上舌覆大千昭等幸忝僧倫深慚勝剎思以身而徇道特為法而求人然重提佛祖已墜之綱宜得慧行絶倫之士顧日月照臨而眚盲莫睹雷霆震烈而聾聵無聞爰自辛卯之歲二月望日本寺方舉千人佛會畢舉洪鐘有師自方外趨來登堂禮佛略徘徊乎祖塔遂振錫而遄征昭等目珠光而自失瞻寶月而踟躇念一去之何追憺中心以忽若乃告幻居界師師驚曰此尊者也日之云暮相與追于雙溪執炬以行剝啄窮于列戶天與之逢果得其處時且丙夜境方在瞑夢緑袍之拜跪覺緇衣以皈依尊者問先古之遺蹤索志書之全帙星言夙駕扳仰無由明發告辭犬馬中結忽念本山伽藍衣緑者衆乃驚神靈為法擁衛有歸搜彼志書用將以獻尊者辱賜徑山之歌重浚放生之沼增我山之光鑒啓列祖之緒端昭等非人知恩知德當今之世舍此其誰八十人中載來果是幻居界師曉諭昭曰尊者道在天下迹遍四方道合則千里命駕義乖而一飯拂衣迅雷不測其機用神龍難窺其躍潛或有銜仰終年不獲半面蓋是門風之峻絶非存情者之可疏親耳吾為子計尊者上足二人幻豫本禪師密藏開禪師並親承棒喝久侍巾瓶尊者法道庶幾在茲一則春風和氣大衆瞻依一則枯雪嚴霜魔眷銷伏真如左右手不分兄弟身既而見之大江以南士大夫之好法者咸舉芳名淨比丘之飽參者盡揚道譽于是界師為紹諸名公勸言昭等躬即五臺山妙德菴稽首二師座下將以不腆用致我詞恭惟幻余本禪師密藏開禪師悟有生鴆毒乘出世舟航號稱飽參實宗門之爪牙卓有實行蓋法窟之頭角平生刻苦於道諸方咸服其誠誓將把手牽一切人同入涅槃場豈得掉臂向五臺山獨居清涼地秋月行空非厭污而匿照春雷震物將隨地而發聲況三千樓閣雖墟而十萬松杉未老山花野草微風動搖猶堪永日暮鼓晨鐘清規隱映未錯用心謂於棒頭喝下可見彼八十一人勿言寺老僧殘曾安我千百七衆紺目金容期重臨於鳥道慈雲法雨且忽湧於龍宮斯雖諸祖莊嚴此山之宿願待人而行實尊者賜歌浚沼之公案得師以了感因緣之殊勝知諸佛之冥加爰遍盟於諸檀特專祈於法座螻蟻微誠冀慈嚴之易動巖龕久寂睹佛日之重輝幸賜哀憐均垂允諾謹疏萬曆壬辰正月元日徑山興聖寺弟子圓昭圓輝海舟古曇性正如升如忭如旻淨霖真月圓曉圓奎等同稽首頂禮尊者與藏大師書大都法化之柄所以抑揚聖凡之椎輪也苟非見地高古脫略窠臼不動思惟神情開朗者誰敢妄襲之哉邇來庸鄙設與言此未有不縮首駭而唾舌者也苟不立志則臭蟲勿若矣豫又何言哉徑山諸僧遠來不易須委曲成就凡一應事體當與幻豫幻居議之可通者但憑汝決之無煩老漢介意至囑開郎目之
