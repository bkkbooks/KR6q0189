body:
  text: 苕上後學弟子王祺校閲紫柏第六世孫契穎壽梓上慈聖皇太后恭惟聖母老娘娘夙培福種久植慧因今現摩耶之身權作人天之眼傾心三寶憫念群生建塔造寺施藏齋僧凡有功勳靡不畢備山僧兀坐寒巖獲沾慈惠不勝讚頌豈盡酬揚茲以山林所藏觀音大士一軸乃鄣郡丁雲鵬所畫古今絶筆丹青上乘誠希有之珍也又羅漢膏一瓶乃方山所出唐李長者造華嚴合論於此山二虎引路天女侍瓶今其山所有香草煎膏服之甚有靈應此乃舊年所蓄尤可貴也又新刻藏經起信論疏一部一册筆削記一部五册續原教論一部一册謹進上慈覽儻有一言半偈開般若之門植菩提之種則不惟山僧藉以報三寶之恩而刻經檀信亦功不唐捐矣謹奏以聞募刻大藏文衆生非佛法則冥迷長夜流浪三塗而佛法非流通則玄言靡宣妙義將隱故衆生非佛法不能自度佛法非衆生不能自弘凡為佛之弟子必切度生既有願於度生必事弘法法之所被見者聞者皆植般若之緣觸者攖者盡對菩提之果如來正遍知由荷法而成惡道那落迦由遠法而入苦流無涘非法不濟覺苑無階非法不臻世出世之福以法而成就為無為之業以法而解脫人有弘焉者如羲和御日四海必被其光明娑竭為霖諸方悉承其潤澤所以臚傅句語能空琰魔之獄蟻浥灌瀝爰升提婆之宮況復琅函羅七千之富寶疊具三藏之文哉鎔冶三賢埏埴十聖拯溺三界導迷九類莫不由茲矣是以群聖幽讚列代咸推屬我熙朝尤尊勝典太祖高皇帝既刻全藏于金陵太宗文皇帝復鏤善梓于北平蓋聖人弘法之願惟期於普故大藏行世之刻不厭於再也後浙之武林仰承德風更造方册歷歲既久其刻遂湮今宇內所行惟南北兩藏北藏既在法宮請施非易南藏雖行諸郡印造猶艱僻壤幽巖何以取辦苾芻蒲塞每自興嗟開等濫被田衣稍窺海墨嘗以宋刻校茲二藏魯魚之訛互有潦鶴之舛遞彰因思法雲以遍覆為功寶筏以畢渡為德教有多門道惟一致時雖異代聖無兩心觀文皇再刻大藏之心即如來悉度衆生之願也今我聖天子凡大藏未收疏論皆收梓于藏中印施於海內豈不欲家握摩尼之珠人入栴檀之林群生歸善四海蒙休哉顧武林之刻既以久而毀則更梓之謀逮于今為急請以三藏並校參之英賢正其訛謬仍易梵帙以從方册所費既約其行必普是體紫宸之仁心而續如來之慧命也昔之人有以半偈而捨身有以四句而析骨遐討於幾萬里之外不辭流沙熱風冥搜於數十年之遙無憚狻猊虎豹誠不忍永劫之沉昏故寧勞於一世深愍諸有之交喪故甘瘁其四體耳今唱化雖勤無流沙熱風之擾剛強難化非虎豹狻猊之倫捐橐易于捨身而所得不止于半偈鋟梓殊於析骨而所傳有踰于四句集彼衆檀成茲全藏俾日城廣燭雷音遠流不亦善歟一時居士若大司空五臺陸公光祖少司寇雨亭陳公瓚太史具區馮公夢禎等皆聞而悅之力讚開等負笈九州乞金七衆闢無上之因田布希有之聖種云刻大藏願文親書手卷徑山古梅菴珍藏道開既剃染即知作佛子當報佛恩蚤夜矢心顧不知報佛恩事當何出萬曆壬午從補怛天台詣武林於紹興道中忽見古寺殘碑載勝國時會稽郡大藏板凡七副因感泣思惟板刻之在一郡者且爾其卷軸流通在天下者當何如哉乃我明僅南北兩板法道陵夷莫此為甚遂願畢此生身命募刻方册板廣作流通尋入檇李得侍達觀老師兼晤馮開之居士輩則老師暨諸居士業已先發是願即共訂盟從事遑遑三載莫得其緒丙戌春走長安籌之傅金沙居士輩反覆思究審知善建事者必先植本本植則枝幹卉葉自然叢成乃定以善信十人歲各捐資為唱緣又一人則各勸三人為助緣蓋分之既易為施易為勸而合之則其資甚裕又其功為有繼至於捐助之廣勸發之多不可思議格量固自有諸佛威光臨之諸善信願力持之照創事之初則不得不以是為定則也居士等因一一發心且各疏其願盟之諸佛并歸道開以為他日經成之券道開藉十大士深心弘願得畢竟是事以報佛恩即碎頭目髓腦作栴檀香充遍法界以供十大士猶為未盡願與十大士共證之刺血書經願文親筆血書現存徑山古某庵馮祭酒夢禎血書一通文同真實願王佛比丘弟子道開謹瀝血投誠於十方常住三寶本師釋迦護法韋馱天龍等衆及楞嚴寺護伽藍神道開為求無上菩提同居士馮夢禎發心倡因刺血書寫大藏聖教夢禎書大小乘經律論各一卷道開書唐譯華嚴經一部普願見者聞者各各如是發心書寫一卷多卷一部多部乃至一字一句滿足大藏永充供養不許出山仗此真實願力韋馱尊天護持神力自今日至彌勒下生一函一卷一句一字不令散失中間若有起心盜竊及作障惱者韋馱尊天現大威力碎其腦為微塵一切國王一切宰官一切大力鬼神下至四生六道一切含血衆生觸我願風無不踊躍歡喜同心護持如自眼目如自心髓若遇佛法有難國土衆生有難我此寶藏即時放光現瑞轉禍為祥一切衆生睹此希奇轉轉讚歎傳布十方俱發阿耨多羅三藐三菩提心如我願不真始勤終怠退失一切衆生善根亦願諸佛諸天降罪於我生遭惡疾死墮泥犁以為欺誑三寶之戒明萬曆乙酉元日比丘弟子道開謹疏和尚真可證盟與憨山老師開至不肖根最下劣習最濃重而拘縛方隘之疾尤在膏肓本師居恆慮開終非道器每加錐劄呵斥而開亦良自痛苦且奈之何昨與老師遇數日間見師於諸事法一一揮霍自在而又委悉精明真有百花叢裡過一葉不沾裳氣象令人私心歸仰反覆思惟是果從何處得來沿途奮激觀念忽爾神染習移一切緣務亦稍覺寬鬆活潑始知此事不從外來向來只因有我以有我故自將一段門面遮蔽在前不得自在如靠墻壁翻筋斗相似前後隔閡今賴身光照爍破我幽暗如暖氣花開春風凍解信知不借功勳又不在蒲團紙墨上討尋而在自心一轉移頃也向疑善財於諸善知識一參見之際不越剎那即證入無量三昧無數解脫門何其神速若此今固知其猶鏡中現像空中答響耳邇來本師謂開有少分如師氣度且囑無忘師恩德若恩若怨狗馬不昧即無此囑能忘之乎開自今以往儻有寸進願將此深心奉塵剎以報老師也八月初十日離即墨十五日宿濟南真空師處二十二日至都城本師居西關地藏數日即避紛潭柘不肖寓龍華勾當求文事業龍華老師處業已如所付囑密啓其意彼且轉致末那公奈此公疾未痊可尚未得白之阿賴耶第幸末那公肯留意少分其可其否一得阿賴耶真實口風當再報師無盡燈意佛像至城即圖寫款式尺寸備語龍華老師謂不爾則勝事無成不肖謂此事尚可舒徐數月無草急以傷大體也龍華老師後亦深以為然此必得師命乃可舉行有便乞示下檢經會約并校草格板新求文字俱俟十月初顓人問候附去自然師大林師大義師暨堂內外諸耆宿乞叱名致聲巨嚴師居雜華菴否張君輔業舉已屬言于比部令誨之比部亦承荷得今冬至長安斯妙耳天節師一見覺其人誠篤有志其嚮德風久矣近且有閲藏之念故奔海上師其納之那羅延窟修完否費資幾何乞詢以示餘統此再布不悉九月十八日與妙峰老師春間一得接足瞻顏遂蒙老師不棄末學直吐肝膽不隔絲毫信法道有緣而不肖開雖粉骨未足酬老師恩德萬一矣蓋事之成否固未可必而老師深心弘願荷擔如來則已於一參禮之頃徹見底源不肖開每對諸佛菩薩像前及諸法侶無論緇素未嘗不讚揚稱頌而諸法侶亦多望風顒顒思欲得一承指誨也老師歸山想共孤雲幽石野草巖花談笑無生與山相忘寧計人間世有朝夕想念如子憶母者耶不肖開四月一日至都城五月草一日旋南發詣彭城復東登牢山與憨老師晤言旬日八月草一歸長安挂搭龍華荷龍華老師甚相知愛第刻經之事尚無毫髮頭緒不知此段機緣畢竟何如耳蚤夜營懷痛肝裂膽願老師於所相知前垂一語策發之是望本師寓潭柘時念老師冬盡春初或得西遊再承言音笑貌於茂林豐草間也不盡種種欲言與陸五臺少宰別門下忽焉五月世間情念固知不作然現宰官身行菩薩道斯則貧衲所引領而深有望於門下者蓋門下平日處心積慮未嘗不欲荷擔斯道潤澤衆生信知門下在朝廷一日則朝廷一日之福在天下一日則天下一日之倚其於處已率物之際當無容貧衲致喙矣乃近得邸報屢見臺省銓曹交相排論雖臺臣數攻張氏并其黨與欲無嚼類有類於擊死蟒者所為至欲比之趙文華等窮凶極惡姦邪之人似亦為過人言嘖嘖殆有厥由兼聞北來傳言謂此疏草筆自門下相距千里未識果否門下意豈不以江陵之惡其罰已極治之不休仁者不忍又豈不以言事者多少年不經事之人徒嘵嘵以傷國家終始大臣之義此門下所以憤激而不平也貧衲竊有説焉夫三代以還極治之朝未嘗不由言路通達諫官得職亂亡之朝未嘗不由言路壅塞諫官失職今縱其人未必皆賢其言未必皆當亦當優容嘉納以作其久屈之氣此誠以天下為重張氏為輕寧恤其他況其言類多抗實恐千載而下必有公道在且休休有容乃居尊之體謙卑自牧虛懷平氣以率庶僚大臣以之不宜有所偏僻於其間激成乖隔以損平明之化矧一涉意氣雖正亦過此心之靈物我同體我感既已不中彼應自然不和且平矣是又可獨咎言事者之失耶宰執九卿與諫官各樹其黨互相抵牾尤二百年來所未有事聞之甚可驚愕此隙一開禍寧有極為今日計急宜委曲調停大臣則少引咎歸己而諫官之外補者當召則召還之事猶可及止不然則將貽後憂做成老來敗闕遺下百世話杷矣以分言之顧山林人豈宜妄及廟堂之事然不外世法而成覺道對宰官機説宰官法且恃知愛又有不得不千里露肝腸者惟當局者詳察之上本師和尚八月朔自金山北渡九月中旬至山幻豫兄以買秋事追之燕都已越兩月矣叢林事宜年來悉從寬惠人情玩弛近者稍加約束人情即難之大都久弊不可頓除信然也幻豫兄謁寶坻今回山得少物即用為買秋之費矣寶坻亦既發願歲施一分南來禪衆慧空兄已入寂場開至真定聞其訃深為傷痛校藏堂中正伊人是賴而天固奪之信人力無如天何而老師之言有以也海音以下八人今俱在堂校對華嚴合論寫刻者相繼從事飲食衣服俱亦安適然人情不難於暫難於久未知畢竟何狀叢林規法自不能人人悅之況創始之初得失自是常事惟先其大綱俟久而自定耳老師在南開實念念懸繫不安蓋俗舍不比祗桓而侍從之衆又鮮深心正見誠恐老師少有動念即于衆生福田不無虧損即老師圓智深慈自多方便而開實於此不能忘念耳今冬幻豫兄已往真保諸處覓求梨板來春始得歸山開于來春擬入都城一吊龍華老方丈并一晤諸居士以廣刻經緣事傅居士竟相左于濟寧道中凡百俱未及與語渠姪云傳有江南之後想必得參見老師矣馮開之雅有入山興但伯俊先期而北恐開之興不能孤起惟老師錫音北振時不吝一投手令得附驥千里可也曇生甚傾心妙德其才略亦足以有為誠維妙德之楨幹幻豫兄邇以讒感稍疑二之即開之言亦不信謂開有偏比于曇生也此誠幻豫兄之不聰致過而曇生于此亦不無少動其念來見老師幸有以慰示之曇生病在量不足成功欲速而遇事太察善走者必蹄齧此亦難以求全矧渠能諦信老師或終當有進益之地耳大行一到山便歸平陽起文尚未及山蘆芽至人送藏雞足九月二十三日自慈壽長發矣臺山諸叢林無異宿昔惟舊路嶺檀那殷勝師子窩雪峰能乞緣燕宗明年安一百二十單修習大都近世俗接待門頭所為空印上座業既相安從事無復他議矣法門垂秋高明者希覯奈何奈何開輩識習昏庸若非日就提警亦易于流浪惟老師俯念蚤賁林泉與曼殊大士交光攝受則豈惟開之幸復陸五臺大司空數日坐病蒲褥多諸夢想深自悲切生死未了忽接來教欲閉關百日誓將纍劫無明一交打徹令人無任驚悚合掌讚歎方今聰明緇素號稱參學類將生滅心向佛祖機緣言境中會得些意思又或靜坐默參反觀自照得少光景便謂入頭便自神僵鬼怪邪氣觸人便口中活轆轆地某經旨長某經旨短某因緣是某因緣非某祖師徹某祖師未徹又或緘口培灌意圖老成受用不知此輩如魑幻附身自迷正倒又如數他寶自無半錢分又如偷飯鬼終不得飽忽然猛虎踞項飛劍臨頭或藕絲愛牽鼎沸熱惱及與一切夢寐境界竟成兩橛覺得來時翻成三個如是即一期生死未知下落況千生萬劫大事因緣諺云種麻端的不生禾經云金既出礦不復重礦未有生滅心及反觀默照會得的佛法而可以了生死證真常未有佛法既有入頭悟而復出頭迷者不觀香嚴擊竹靈雲見桃夾山之於船子臨濟之於大愚皆金出礦種禾得禾樣子也又今參學功夫大都謂持某則因緣恁麼參恁麼起疑如此説來正如按牛頭喫水又如無愁強哭是又不得種禾法則終不得禾今有人於此云我念佛念某佛我看經看某經我修觀法修某觀法都無不可第云我欲參禪參何禪好禪作麼生參作麼生起疑告之者曰參某因緣好恁麼參恁麼起疑不得向意根卜度不得向舉處承當不得放無事甲裏是大可笑蓋孝子之於親也一聞其命終渾身是躄踊渾身是哭泣豈復問人如何躄踊如何哭泣是好渴牛之於水也一望而奔豈復左右顧盻生死未明人渾身是參疑觸處皆話頭豈復問人參何因緣如何參如何疑是好豈復有卜度承當種種等過患可防看來只是生死心不切世相情重逢人問著不了決處便將聰明知解蓋去不知痛癢不自面熱耳聾亦無惡辣師資糢糊度日若肯辦一箇真實要了生死心日夜痛苦決定一見古人一言半句不了決處或被人輕輕敲著便向意根圖摸或信口信手亂統不合古人符轍自然知愧自然渾身不放如服一丸毒藥入肚昏悶之極亦不自知是毒非毒不死不已此與臨濟三年不解一問佛法才開口便含一肚毒氣死向大愚何異哉貧衲深思近來參學牛毛了悟兔角其過在此茲荷慈召相與百日如古人爆地粉碎一場實深懷至願奈禁足有期不敢出格取誑諸佛菩薩及現在大衆謹布區區願一掃世緣將要了生死心無剎那間斷蚤暮悲哀自然舉得高跌得碎百日定不空負也貧衲昏迷全資指燭是望是望與龍泉兩堂上中下座諸師昔溈仰父子有南山刈茅之語而天童頌之曰是須記取南山語鏤骨銘肌共報恩恭泰聽圭峰演華嚴疏鈔斷臂以酬法乳今諸師于龍泉法席三載而皇皇焉以仰答為心誠所謂知恩圖報者矣雖寂子泰公復作豈多讓耶矧茲末劫重生輕法沿習成風而諸師乃能爾爾是又貧世之寶後夜之燈也殊愧巖阿長物野朴疏陋無能為諸師表暴萬一聊呵凍捉筆以塞諸師之命嘉平月十二日漏下且二鼓門外雪深數尺矣復空印法師詩曰率土之濱莫非王臣而或者固執謂舜為天子瞽瞍亦北面而朝之釋之者曰周餘黎民靡有孑遺是誠周民靡有孑遺乎哉善説詩者不以文害辭不以辭害意可也肇師物不遷論以愚意觀之大都直以法法不相到法法住本位為宗其引般若等經論及昔有今無不滅不來之説廣借曲譬蓋不出此竊觀吾師所駁固以昔有今無為斷常遷滅之見是則是矣恐亦未免瞽瞍北面而朝周民無孑遺之過也故曰人之所謂去我則言其住人之所謂住我則言其去又曰正言似反誰當信者良亦自苦矣且如來説法亦有偏圓大小之殊故鹿苑雞園演唱局迹因緣般若敷陳蕩除有執因病發藥初無定方豈得逐言逐句而盡以華嚴法華圓頓之旨繩之駁中常住不遷二義一性空二真實愚謂肇師不遷正屬真實義即其引用性空等文為證似皆借意非其本宗若不爾者則肇師何人而顧反背支離一至此耶不肖素于教乘未嘗深究比來忙冗即駁草亦未暇細尋容再搜研以請印法正心論序簡略草率誠無當乎作者當為歸趙俟其來山再作商理因明判宗破相及以中道實相釋正理殊為謬局誠有如師所云第菩薩智證之言似無大過唯泥執則成過耳何也苟非真現真比何能真立真破以開示諸有問者圭峰謂達磨禪為六度之一誠未夢見達磨面孔在來教云云雅愜鄙意天台判華嚴別圓先哲業已論之茲復奚贅若夫初住入聖增無明為四十二分法身品數亦如之又以四十二字配四十二位等乃至謂染惡即是緣了二因為衆生本有等誠不知其有何的據無容強辨第性惡之説竊謂不然蓋性不可言善不可言惡不可言無善無惡不可言亦善亦惡若言善惡則諸佛衆生皆有自性當無庸修證矣若言無善無惡則十界染淨從何處來謂從緣起必真如隨緣故不爾則心外有法矣是故性善性惡性善惡混性無善無不善皆見網中語非我師大沙門説也永嘉集解容校訂棗柏論竟細讀一過然後請教昏擾中草復不盡欲言與沈恆川居士夫一念不覺永劫沉淪于永劫中萬死千生得生人道如滾芥投針盲龜值木不已難乎得生人道矣而又聰明饒裕為尤難得聰明饒裕矣而又知近事三寶尤難之難者也居士輩具此三難善根非淺然自今以往所貴善自保護務斂華歸實去巧反拙實實發心實實放下諦觀三界其猶火宅萬有無異空華胡為乎于火宅空華中競安競榮依稀歲月鬢已二毛及今不圖後將何恃脫報緣謝去求此身即不可得況聰明饒裕又況聞三寶名而近事之乎一報五千劫出頭實難勉力撑持惟在今日居士輩其勉之刻藏緣事初未嘗有望于嘉興乃梅村居士并居士輩竭力唱和幸亦就緒然支那衆生以財為命欲其修習檀度最為逆情即已定未定之緣亦當方便隨順無以此法苦銼人情儻因此而退失善根增長謗詈則尤所得小所失大過將誰諉也惟居士輩善為調燮不爾則無上勝緣翻成法道荊棘豈區區舉事之心乎王佛子南回無以為訊聊草八行直心道場逆耳奚恤東源先生今歲于二令郎習業想能終始其事計此時尚在同居故不別啓乞為致聲二令郎亦須責其習尚敦朴以介福壽彼功名則身外物也得失何有于我哉與王宇泰董玄宰兩居士經云發心畢竟二不別惟是二心先心難此不惟出世法為然即世法亦爾故志學而後從心知止而後得止是因心果覺毫不僭差未有表影曲直相為乖角者合而言之亦未有世道少或背馳而于出世法門名為得入者兩居士厚賴三尊冥力及以諸緣所資致身清要則果終遠大似有可期然因地發心實在今日乃有三事為兩居士言之一無徼惠于人即人有以惠徼我者吾寧冰蘗自持無或輕徇一介取與惟道義是從不然則他日未有不隨緣欺假以君國殉人償所得者苟或緣不我假心不欲欺則他生他劫當必改頭換面以身償之矣何也有其投之靡不責報剛欲難乎兩全我物展哉一喪諺云貪他一粒米失卻半年糧可不懼夫二一切飲食服乘子女僕從乃至器用田宅色色仍舊無學流俗輒自張皇即惡食縕袍恬以自處蓋國典養廉惟此時為甚菲舍此即上下交際乃至賦役供輸有辜科贖皆有典則存焉毫非我有脫為越取皆屬盜因不肖恆謂當今之世有志德業者非三十年不改窮措家風不可矧淡泊廉靜足養身心亦志道者所不去也三一切寵辱得喪毀譽是非乃至名位利祿諸有種子由今以迄歸老絶無粘帶一粒半粒投之八識田中令其發榮條達喪我嘉苗蓋吾本有靈種淨妙虛明了無一物良由一念瞥起遂致轉現相因六用交錯如蝸牛兩角蜀路千岐令諸有情奔逐無歸伶俜孤露可哀之甚夫千生億劫幸得此人身而又聰慧超倫與聞阿耨多羅三藐三菩提名教誠所謂盲龜值木滾芥投針安可一旦失其所有事永嘉云心與空相應則讚譏毀譽何憂何喜身與空相應則刀割香塗何苦何樂依報與空相應則施與劫奪何得何失心與空不空相應則愛見都忘慈悲普救身與空不空相應則內同枯木外現威儀依報與空不空相應則永絶貪求資財給濟心與空不空非空非不空相應則實相初明開佛知見身與空不空非空非不空相應則一塵入正受諸塵三昧起依報與空不空非空非不空相應則香臺寶閣嚴土化生如是法門幸兩居士于車塵馬迹中常令現前無或間斷儻得一念相應即千古吻合雖身處長安吾國晏然景星慶雲行布虛空令人可仰而不可即又如淤滓中牟尼寶珠光明獨耀又如火中蓮華色愈妍麗如是真不愧親見作家紹隆真種稟受如來家業也既爾即從事世間功業亦何異甕外運甕幻人出幻無煩力作勤勞如其不然吾知未免身入甕中且為幻轉矣之三者信皆兩居士素所明了第恐當局之迷故為喋喋又且千里長途托始跬步苟發軔訛謬駟馬莫追矧敗轅佚駕于前途者歷歷有之故又不設自外知己而靳此因心中一言也兩居士其勉之與都門檀越嘉興楞嚴寺宋長水璿法師疏楞嚴經處也師疏經時天雨花慶雲合事聞于朝賜額楞嚴寺入我明為三吳名剎嘉靖間佛殿災遂為豪右力侵其基而別業之易蘭若為燕樂之場化禪誦為歌舞之地有識者慨焉已而按院王公下議巡道轉行府縣歸復之一時人心稱快今聖母慈聖皇太后遣近臣御馬監太監陳公齎送藏典詣彼兼經營殿宇有事焚修為今上及皇長孫祈福壽誠一時勝舉也撫按守巡及郡邑長不可不借重其尊銜立石而天津至滸墅河道關津諸使君不可不疏其阻滯藉其衛護且五臺新刻經板皆在臨清登舟而臨清鈔關尤不可不通白之也儻於其中有可下一轉語作佛事者幸隨緣成就之無吝焉念六日早發不及面別謹俟徽音又貧道竊謂五臺為畿輔右臂所恃以林木為藩屏其中多設名藍大剎是又以三寶為城塹不獨稱勝境也無奈久為姦商大猾擅為利藪每每赤手砍伐圖獲巨萬之利而寺院盡為牛圈僧徒皆為奴隸且各處流民潛住在山以砍樹為生計以開墾為窠巢木假抽印為重地藉納糧為名斧斤行於前一火縱於後往往利歸民家禍貽僧寺邊防由是而壞僧寺由是而廢此從來之害所不能解者萬曆六年間曾經胡雁平揭帖高撫臺題請為邊防重計設禁甚嚴山林漸茂未幾又以墾荒之例開此釁端其害入骨萬曆十七年本山都綱司具申按院蒙批道轉行府縣查勘已經回申本道未蒙轉詳昨因陸太宰遊山適呂撫臺親歷其地目視其事遂毅然為邊防長計作名山護法此蓋文殊有靈所以冥資大權發如是心耳極為慶幸愚謂臺山復興藩屏復固在此一舉但行繁峙縣查議只緣據目前將本山師子窩鳳林寺等處二三山僧坐砍伐開墾擬遣招詳特蒙寬其既往概行釋放兼給告示禁約亦云念事非一朝罪非一人以前罪端姑免究治此深見撫臺護法至意既而該縣重前申究誠未洞察姦商巨蠱政欲借此為口實因而乘風夤緣駕禍於僧以此為影身草耳愚謂若必罪其山僧而實中其姦計今後即有禁治而又罪歸於僧利歸於民此則愈禁而愈不能禁矣蓋僧人修造百不過一而商民伐木賣板開墾十居八九今獨禁僧而置商民於度外誠所謂放飯流啜而問無齒決也其害在彼不在此為今之鎖鎖不能盡述但乞查萬曆六年前院題請事例九年免糧案卷及十七年都綱司申文則洞見毫微然須姑免山僧之罪嚴禁附近姦商之家不許砍伐斷夤緣之路收開墾之令免徵糧之役嚴令有司防範僧徒守護此後一木不許出山尺地不許開墾此則一斷永斷邊防不待整而自固僧寺不待保而自安此所謂灸膏肓之病而正得其窾竅耳但此情不能上達誠恐有負呂撫臺此番盛心願借重鼎言一轉致之惟此不獨為名山功德而實為國家長城萬世之利也伏惟慈鑒幸甚與桂峰師震旦佛法獨痿癖於齊魯間賴老師深慈久念潛回而默起之而老師忽復贊助神功大完元氣信又可支百年喘息矣此非乘大願輪秉大慧炬受靈山記莂而來者安能有此不肖開生也不辰何幸有東海之遊又何幸而親炙師光明之盛若此也固自慶更為齊魯含識慶且也躬承老師種種攝受種種言音種種笑貌令人別來旬月常恍惚在光儀左右雖夢寐有然古人道靈山一會儼然未散信夫校藏之期師之意全賴老師主張此實報佛恩德第一公幹也願留神萬分餘俟十月顓人問候再布不悉與稚菴師牢山之遊厚賴賢師徒殷勤款接更藉杖履追陪以故盡諸幽勝靡不賞識信乎五百商衆得登寶所實化城導師之功不可誣也關王廟為牢山化城賢師徒為遊牢山者導師其功德利益甚非眇小惟深大願堅勇不退或權或實或低或昂互相鼓激務俾震旦有情盡睹海印光明不獨為區區齊魯作大津梁斯完吾願耳於賢師徒有厚望焉餘不悉與東禪月亭老師開二月去檇李時老師杖履在天台未得一瞻禮稱辭為歉開入都城佛事人情頗皆順適第為時不久但可植因未委結果當在何日爾老師今在東禪四大調和少病少惱一切境緣隨順否老師年未及六旬而形容憔悴似過之此皆佛法上留神苦多更日過慮田園衣食之資無人料理致令老師獨疲於精力也不肖開願老師自今以往凡期席可卻者漸卻之凡田園瑣瑣緣務可休息者漸休息之俾法幢多樹於世一日則衆生多受一日之賜且老師數十年以法乳餔養末學而末學中竟無一二蚤晚侍奉巾瓶并仰體耕鋤之慮其過安在蓋由老師平日即錙銖勺合之微不能信託於人故耳然以此之故人多疑謗人多怨望人多竊掠我知老師臨命終時未及眼光落地以前且無塵渧為老師所有詩曰殷鑒不遠在夏后之世老師其法舟月溪二老是鑒乎言及於此淚瀝肝腸不肖開情知老師左右無以此言進誠以江南數十年法道全賴老師力挽回瀾寧忍復以此聲施身後此不肖開區區狗馬之念所以欲隱忍而不能也苟此念毫有未真或他有所囑及屬輕狂好事甘墮拔舌泥犁諸佛菩薩且為我證知矣老師其謂我何哉楞嚴時風波願老師時垂照燭梅村居士實老師貼體金湯願開心相與終受其益更願於一切法大都圓活一分免他日挂衣之纍也人行促草草統惟慈亮十月二十日與平廓師春盡入都城會我本師至自牛山而妙峰老師且未去蘆芽并在京諸耆宿咸得歡晤一時賢士大夫尤顒顒嚮風本師刻經因緣雖未見華苞果實而般若種子則已廣布緇素八識田中矣無何而繆仲淳忽有母氏之變時未出都門已哀殞幾盡不忍其哭死道傍因以法藥扶之至彭城始別去旋自彭城取道莒父即墨東遊牢盛訪山老師牢盛故為釋氏道場載華嚴疏鈔元丘長春力廢之其山水妙絶寰宇而老師尤越量大人因相與馮陵島嶼撫掬滄溟恣質已疑商評法道瞬息之間竟移旬月而亦不自知山水病狂復沉湎之久也八月盡歸錫燕都今冬或無他往來春復有清涼蘆芽秦晉之遊大都以刻藏復楞嚴二事因緣出現於世第不知畢竟有幾利根獲蒙授記耳老師錫今何在四大調和及少病惱否奉訊雖疏而此身此心常恍惚在光儀左右想老師亦必時鑒區區狗馬之念於杖麈間也千里雖遙此心不隔不肖固自諒且諒老師楞嚴時有外障願老師不吝慈光恆垂照燭不肖知此道場終不落落山中經閣想已落成見如居士近來何狀蓋今人要了生死須是大破常格要了生死人相處須是大破世間門面常情苟以情順情如玉磨玉交相掩護擔閣前程他劫他生築頭磕腦未免愧心愧色也老師以為何如心弦居士途中一偶因追逐風塵彼此忙促未及少致溫款至今為歉幸老師為我叱意人行促草草不盡欲言與幻居師別來道業何似居山中既無俗染營心又有松風竹月助行則他日相晤當必有大可刮目者在也不委山中向來四事之供仲淳亦頗用心否儻有闕乏須遣人告之蓋彼俗事為繁或不無忘念耳本師冬在妙德幾百日日惟一食食且粳餅小米粥而精力猶王神意甚適信至人日用直下便是不間絲毫有非情粘識滯者所可思議也不盡與仰崖座主菩提達磨以鷲嶺一花東來震旦六傳而為曹溪曹溪嫡嗣則有南嶽讓青原思青原再傳則石頭遷也讓遷二祖皆出世衡之南嶽今五宗子孫皆其所出子孫遍天下而委祖宗之地于寂寥草莽漠然若罔聞者其忘本之罪當何如哉以故老師特繪二祖道影將送歸福嚴石頭以示天下知祖宗所在其用心亦良苦矣竊念今上聖母年來所造金襴僧伽黎以供十方師僧不下千百孰若發心嚴造二襲隨二祖道影永克供養即以此為皇孫祈福壽其所得不既多乎二祖像今幻余師請去京都寫傳并裱軸吾師當詣茶菴一瞻禮之或即請進內庭一瞻禮以啓發其信心亦可也師不遠有南嶽之行此衣此像即欽命座下齎送亦可又聞南嶽已有大藏或即隨藏齎送亦可但行時必得不肖一經理之斯盡善耳此舉實報佛祖深恩惟座下留心無忽造衣當不比尋常須得龍錦作無上莊嚴可也大藏必須藏之方廣寺此事向與妙峰師言之矣今未卜何如座下并須著意此時都城莫非為一己一寺圖者獨座下實心實行尚可與言故不惜瑣瑣惟為法是囑與汪伯玉居士竊惟居士棲神法道聲振一世貧衲未剃染時已知黃山白嶽下有現居士身作師子吼者矣第恨東西路岐無緣覿面眷懷有道惟遲後期邇者貧衲業有微志欲翻刻大藏廣為流通因緣會合時節似偶然贊襄緣起端屬名賢念居士為當代宰官耆宿可無片言敘述以繫此方之望耶弇山老人與居士以道業文章相許可為世宗匠今弇山屬意茲舉獨有深心合集居士便成雙璧居士乘宿願輪挺生明盛於佛事門不捨一法矧事可報佛恩續慧命意者居士當更不惜苦心也世外人惟一誠相向不敢作尋常虛語以瀆尊聽統祈慈原幸甚與汪仲淹居士楞嚴目擊雅識道存違離已來時復馳注頃以刻經因緣自五臺反三吳始知居士抱病經年益增懷念不知居士於病苦中能以正智照了不為所轉否古德云太末蟲處處能泊不能泊于火焰之上當知一切病染何異太末蟲而正智則猶夫火焰居士聞熏力久般若緣深當必默然丈室無容致喙然重以叔宗行又無能終默勒布區區亦不自揣量者也惟格外亮之與王弇州居士側聞居士棲心玄遠冥與道會貧道雖山林野人亦知傾注比因緣會合得奉周旋和風慶雲儼然仁者自非宿植德本何以有此願益熏修作護吾宗開發同事令出情之法頽而復振茲非居士最勝因地歟外承居士許撰刻藏緣起顧念居士久向此宗博通教旨又勝論雄文匠心獨妙方今海內學士大夫以文章名世而復留神法道者惟居士與新都汪公為赤幟耳今居士已自慨然獨不得司馬公片言為此舉前旄尚屬闕典貧道不久還清涼且不欲以山野干王公惟居士念之歲序已更願道念與日俱新勿使毗耶獨擅往迹是所望於居士也不宣與周鳴宇居士左右襟期曠遠神明朗然雖日垂紳朝堂時復潛思物表故於割絶塵氛之人亦自雅有冥契逮憲節東建貧衲正兀坐龍華無由以法水潤屬車之塵辱致拳拳徒懷高操貧衲比欲再刻大藏播之震旦為緣既普沾潤亦周當代名公咸有敘述豈以門下辭吐珠玉照耀一世顧獨無贊歎之語耶以故願托雄文舒光四表俾般若以之流通慧業由是成就其於利澤不亦偉哉願門下深心圖之國學弟子吳惟明與貧道為法喜遊其人上士大雅之赤幟吾宗之白眉聞其將過淮東敬屬致一辭以通精誠惟門下晉而與之當見芝蘭之在側也奉去刻藏緣起一册與馮開之居士別來兩易寒暑信光陰易度人命無常不委足下邇者作何面目夫三界種子不越瞋愛二芽然荊棘法身戕滅慧命則愛纏視瞋毒其功能輕重大小又不啻百倍故古德于愛見有以腦後箭喻之者蓋覿面者易見腦後者難知易見者可回難知者必犯也青山白雲足發幽想聲色貨利多滋俗情不佞謂居士于城市山林當分時而處若也沈湎市井久卻林泉無乃不可乎幻居兄飛錫南還意在雙徑雙徑去武林密邇足下儻能以肩輿時相過從則松風竹月之下罏香碗茗之間可以滌煩襟而袪俗慮澄性宇而湛心田也矧楞嚴纂注方待參評惟足下圖之刻經期場南北終始業已言之仲淳雙徑之圖似不可緩足下與仲淳其密留意焉務使彼輩歡欣樂成事乃可久且于化風無損也不盡與松谷老師久違良導益涉狂途深嗟歲月之飄流無奈菩提之遙遠是誠有孤如來之遺訓知識之指南也匪獨佛憐良亦自苦近聞老師法席森嚴學流整束此不惟模範端則器易以成實抑風氣靡而時不可徇非老師之仰承先覺俯念後來寶鐸堅鳴金鎞曲施霈霜露于陽和之後使萬寶告成投參苓于薑桂之餘俾四病皆起何以有此哉開也執侍末由翹勤有素偶因風便聊附訊言俟入都門載參杖麈以承謦咳兼吐私懷寶舫及空古淵三子者心地平夷志行醇篤今夏在山對讎大藏亦頗用心茲詣都城期探講肆儻其可教惟進而與之亦見慈悲拯拔之念也不悉復曾舜徵居士來諭謂夢者夢知夢者未始夢此未免將夢者與知夢者判為兩箇過在心外有法法外有心又云當其夢時孰為不夢者此未免將夢與不夢分為兩橛過在撥冰覓水舍器求金離此二途脫將夢者與知夢者夢者與不夢者融通互攝非一非二有如永嘉所謂實性即佛性空身即法身亦未免認賊為子喚奴作郎審既爾畢竟作麼生話會居士若向這裡不眨眼佇思定奪得出如在大火聚中將夯得一莖眉毛來則暫許居士作箇同參雖然如此亦只是教乘極則禪門下若向上事未夢見在蓋能同條生不能同條死也其或未然切須猛著精彩極力覷破要知此事不比尋常非是筆舌聰明境界須是一番寒徹一番覿面始得居士其自勘之與于中甫居士本師居北園機緣非偶此實衆生福田損益攸關不肖繫念于此未嘗少輟所貴足下時在左右無令疏失斯為得耳不肖以九月上旬至山叢林規範漸就調停南來之衆皆已入堂校對華嚴合論寫刻者亦相繼從事矣合論訛舛頗多即南方新刻八卷其校訂出馮先生樂子晉手然亦弗就妥今山中寫刻俱善有非南方諸刻所可及若全藏得如是終始誠至願也宇泰及足下兩緣皆當刻意完全與曇生來賀氏緣事只須足下作字并不肖書封去取來就金壇發付可也如必欲曇生親往亦無不可但曇生親往須仲淳與俱乃善惟足下與仲淳計之仲淳精神疲頓已極陽地陰地皆當隨緣即使得地而不有其軀亦世出世兩失之矣仲淳內子止可移就認卿同住若買妾則可依介伯更須一相知親屬同之可也介伯心直而粗恐亦不能照灼姦佞須仲淳與足下補其不足更得潤甫留心為當荊南産業在賢昆圖之儘無不可若仲淳則不可多營田宅以孱弱微軀形影相吊朝莫不保但得子息以謝先人便當作長林豐草間物寧復鼠竊狗偷以營營世網乎以有限精神奔馳非分事業誠非計之得也若果雄習未盡則宇內不爭之功若名若利不少豈區區事此此不肖所以踽踽涼涼惟正是守即為法門事亦不敢他有所圖以自雜耳來諭東土之事意者即仲淳所言常熟邊海耕種商賈之業乎若爾決不可為蓋諸君皆非終于世路而文卿亦不足以主張此事舍文卿則更無人矣已之已之今而後一切世事但在收斂無為開闊況仲淳尤不宜涉此也祝祝文卿止是少有苟安氣象亦無苛責之過翻成有損無益此文卿亦不自知足下以為何如劉戶部吳尚卿俱明春入京圖晤文卿信當以太僕告歸亦俟來春與之語本師在關中上下飲食須是調適廚灶必在內乃能妥本師出開後方可作貴溪之行事有大小慎無倒置陸臺老聞有志求見本師不肖謂尚非時節因緣此須仲淳及足下維持之但使其繫念不忘可耳列祖畫像隨緣多寡無強人以不堪善卷祖堂之舉亦宜從容季倫明年必得與足下同朝夕乃可足下須出情量以成就之傅居士南行必參見老師馮先生頗有意清涼第傅居士先期北返恐緣不能孤起仲淳須方便成就之不肖同衆由清源步行入山精神俱強王至今無病患幸無念仲冬十三日釋某和南中甫足下仲淳潤甫均此不另啓天池期場東禪義倉仲淳俱當留念護持之與繆仲淳居士曇生歸山得手書已備悉南中事體然要之一切境緣本無好醜亦無違順良由吾人不能照燭徒以情識承當故觸處坎坷隨緣荊棘愛媒怨賊劫戮家珍此誠學人所當蚤夜痛心以自剋責消殞而況敢復于坎坷荊棘之上因成待續增培灌溉以齎法身慧命耶且足下生平染習感激獨多苟非善自和平則來報豈辭瞋類幻人夢事陽焰空華智者于斯詎生實解即世故縈縈交情擾擾但得親齎就土孺東已吊孰若暫作清涼遊以遠塵樊況青山白雲足生幽想高人逸士可滌煩襟儻遂斯行誠計之得又且清涼一遊竊恐足下終未可免時節因緣亦在今日過此似難舉策矣惟足下圖之刻經期場南北終始業已獨為足下言之雙徑之圖于今似未可緩茲幻居兄南還當送其挂錫彼所潛為啓發然後足下與開之先生因之往反以便宜取事俾彼輩無所猜忌傾心樂成斯為得也惟足下與開之先生密留意焉與太原王龍池居士蘭軒居士輩凌冰雪履巉巖以詣妙德而神氣狀貌乃沖容可掬是固曼室慈光有其攝之而居士襟宇飄廓蓋亦可見第其頂門一眼徹底瞢然愧自力不強金鎞莫展經云應以宰官身得度者現宰官身而為説法是所願望于龍池老人也老人其念之刻藏資戊子年所寄惟東白止付一兩餘皆符合此必東白一時空乏貸用不以相告耳惟居士稽核之蓋出世因果錙銖塵渧未容混淆故也與傅伯俊侍御自入山來冰雪萬叢高賢四座相與趺坐普光明殿共方山長者入無相無願三昧深談四無礙法界法門乃不覺一念瞥起轉現相依夢與居士聯舟夜泊其地儼震澤之胥口忽有胸者三人詣居士強有所需居士叱之遂虜居士及內君似子載而去蓋緑林豪客現胸者身也不佞聞驚推蓬居士得脫賊匍匐水涯不佞援之登舟蓬跣袒裸殊惡狀然神氣則沖然粹然不變也因相與慰言把手遠矚風濤灝渺不瞬睫間而賊艇已相距十里而遙殆不可追矣覺而胸中若有所觸者久之乃自念此何祥哉動我心王若此次日果有僧來自四明為報維摩臥疾于毗耶誠為機感之相通有如符合者諗諸左右既不堪詣彼問訊復何吝妙德一言居士志山水懷名勝亦既有年一旦俶裝前途即遭困折不審于此何以為情夫心境二邊不過得失逆順兩種得之得孰與失之得之為至順之順孰與逆之順之為大故曰貧賤豪戚庸玉汝于成信矣夫失且逆所以造吾至得將吾大順也然此猶在人天路上行履得失逆順圈圚裏蹲坐苟出此圈圚超此路徑又奚至大之足言況也獵者不避虎兕漁者不擇波濤清修之士不厭煙霞泉石癖在勢利者不恥寒酸局蹐婢膝奴顏壯士不辭馬革裹尸貞女不讓朱顏瘞土豈懷道德者而顧以境緣夷險二其心哉吾知居士久已掉臂此關然法侶妄情不能自遣故復作此剩語居士其照之本師挂錫金沙想得參侍開之仲淳中甫叔宗諸居士必獲周旋凡所接納及所遊履所得益當無吝一一示我以慰遠懷華嚴合論校刻頗精卷尾顯名意旨不委于尊堂內君嗣子及先亡有欲及之者并乞示下以便後刻北上當在何時清涼之遊得果所欲否曾與開之輩有所期約否令似當嚴督其課業無或惰之斫大木調良驥非姑恤俗情所能爾也居士其念之又與馮開之居士苕溪別袂返楞嚴未幾即詣金沙躬侍本師旬月始北發九月至山山中事宜粗為條析南來之衆俱入堂校對華嚴合論寫刻頗精不亞弘明諸書大藏終始盡得如斯誠所願也合論即吳江新刻八卷亦甚潦草訛落至若去經存論亦有未妥蓋志寧合論時已失長者故物而慧研刪釐合論則又失之以故子晉筆削大都于長者血脈無從聯續而志寧慧研私增科判亦未敢輕削是不惟無補長者反增重其迷誤不若存舊猶間有得失可指議也本師寓金沙久之居士曾往參謁否夫末法衆生易于懈退非善知識無由策進學人知見易于淆訛非善知識無由揀辨故曰水中乳惟鵝王能擇之又曰大唐國不是無弟子只是無師有師矣而又慢于請決則報緣一謝束手長往業海茫茫出頭無期伊誰之過也身世匪堅光陰迅疾惟居士勉力自強古人三日刮目吾輩三年之別各猶故吾則襁褓中兒不可久違慈母信矣傅伯俊久遲居士同了清涼之願昨過聊城聞已南遊此時想曲盡江南諸勝兼得本師為之指南所謂捷足者先之伯俊之謂矣仲淳精神疲極良可哀憫儻其親已葬孺東已吊居士當攜之同入清涼少事將息可也與松江康孟修居士蚤秋去吳門詣金沙侍本師旬月始北發九月至山山中事宜一一條析南來之衆俱已入堂校對華嚴合論寫刻者亦相繼從事寫刻頗精不下弘明諸刻大藏終始盡得如斯斯愜鄙願耳茸城檀資想已合集乞付沈認卿氏轉發來山山中自後遣力蚤暮蓋無定期江南緣事則惟各所主盟者不違時失候收付認卿氏已耳施者姓名除銀封內填注須更以別紙開揭緘附可也身世匪堅光陰迅疾願諸居士各努力焉參須實參悟須實悟無為光景門頭擔閣自己喚甚麼作光景古德云若人識得心大地無寸土果識得心則大地無寸土其或未然則不惟世間種種得失榮辱愛憎取舍名為光景即寂靜山林逍遙物外乃至菩提涅槃及有法過于菩提涅槃皆光景也雖然水中乳惟鵝王擇之光景中心惟善知識辨之諸居士既遊身于功名聲色之外豈一無所以圖決擇可也此啓孟儒仲醇孟修中復四居士足下他相識均此致意與吳江周仲大沈及菴吳孚泉三居士江城言別隨詣金壇侍本師旬月始北發九月至山叢林事宜一一條析南來之衆皆已入堂校對華嚴合論寫刻者亦相繼從事矣江城所刻八卷近入校對其訛舛視東禪本尤甚山中新刻幸得多本校讎過或差少然校書如掃葉自古難之第寫刻頗工緻不下弘明諸書大藏終始果得如斯誠至願也江城檀資想已雲集乞付認卿季華檢發來山自後每歲所供惟在三大士不違時失候收付認卿季華兩居士以候山中人遲蚤詣彼索之山中遣役或遲或蚤蓋無定期也汪仲淹寄我佛像手掐俱在叔宗處乞并發訒卿付來小白毫筆隨緣惠我二三十枝與吳康虞居士計不才去金沙不久足下輩且相繼至恨未能少遲一話別并悉種種為怏刻工始末叔宗處寄言何魚鴻杳然也邇接手札已備悉其事徽人勤儉雅稱山居信有如足下所云舍徽人則江西福建亦庶幾其近之吳人信未可獨任第此時寫刻所尚皆弘明集家法非吳人則雖各有所長而獨短于此矧拳刀筆法尤于板字不宜近有歙工吳應芝者來山以言乎帖意軟字無或居其右獨此則視衆工瞪乎其後遠途跋涉進退為難良自苦矣黃守言者其手筆絶倫固于墨譜見之第恐其于板字亦非素習山間此時選擇頗精不亞弘明少有差池難乎情庇此事未可遙度惟足下以實告之令其自作行止儻支給路費令之入山即莫可進退非策也北方定價字每百工食銀四分彼輩誠能改拳刀刻板字固所願耳南羽所繪經首佛像須覓此人鏤刻乃善刻已可寄楞嚴屬首座忠菴師尋便轉致歸山卜居義興頗有法侶相親近世出世法俱便宜宜從之足下以孱弱之軀道業世業兩無頭緒南羽亦流浪無歸智者觀之深為二居士憐恤人生朝露住世幾何即于幻夢中造幻夢亦當隨分隨緣時防時檢不可剎那無出身路在也與瞿元立居士慧空師于校對場中方藉其為衆表率而天固奪之不才至寧晉聞其訃深致感傷蓋悲人命之無常而悼叢林之失賴也山中道場頗闃靜南來之衆業已結期校對華嚴合論寫刻者亦相繼從事寫刻頗精美大藏終始盡得如斯斯所願耳別來面目何似果仍舊時抑新有所改換日用畢竟作何消遣不才每念足下精神疲劣色命尪羸而復驅馳世路儻大事未明遂致淹沒以負生平良亦可哀此足下亦曾自念及之否且足下習氣雖似孤冷其實多情兼之勝解紛紜本光粘滯古人所謂事障易遣理障難除其足下之謂夫不才年來南北奔馳事椿碌碌雖于己分上志有所用然念多作輟猶然故吾言及于茲不覺汗顙呵凍不盡欲言與賀知機伯仲古德云太末蟲處處能泊不能泊于火焰之上衆生心處處能緣不能緣于般若之上何也般若如大火聚有其緣之則能令本光孤燦習漏隕亡器宇含宏襟懷高卓恢諧萬有甄育群靈江漢秋陽不足為喻故曰天上天下惟吾獨尊般若有如是功能信非夙植德本緣之豈易易乎哉惟居士伯仲芝蘭孕秀金玉含章萃美一堂於世諦亦燁乎可觀矣乃知三界火宅萬彙空華能於此留神而求出離不佞耳聞且久目擊已存謂居士伯仲不于一佛二佛三四五佛而種善根不可也第此之一事不難于發心而難于究竟不難于一時而難于永劫不難于安常處順而難于造次顛沛誠欲易此三難必也晨夕起居之際左右屏几之間不捨般若言詮半部使其機感合熏優遊自得有得即請印決于大知識門墻揀其真偽如是即古德所謂不能緣者我能之矣矧于三難乎何有惟居士伯仲勉之刻經資費乞即集之中甫轉發無羈去後曇生師以武胄出家心真行實亦發心相與從事刻藏因緣者也南方緣事悉以屬之居士伯仲所施或竟付渠亦可其施者姓名須一一揭示與徐孺東尚寶燕山別面忽焉三易寒暑雖形聲邈絶乃心神嚮往矧聞性天順適台履安和兼之臥穩東山心勤淨域實為慶慰無量焉夫聖賢豪傑之生斯世也不偶其出處亦不偶生也以時其出處亦以時故歷山莘野之耕富春渭水之釣檻車之囚首陽之餓皆不能為時能不失時已耳其既也訟獄歸阿衡任飛熊載伏龍出乃至一匡底績者有之終身羊裘餓死者有之皆不能為時能不失時已耳斯時也矰繳上機網罟下張即飛千仞走叢薄懼猶不免況兩絆其足而求致千里哉昔人有言靜漠恬淡所以養性和愈虛無所以養德外不滑內則性得其宜性不動和則德安其位養生以經世抱德以終年惟先生以之乃若出世第一義諦尤自有時節因緣貧道諦觀先生其于佛法時節似宜更遲之歲載為先生今日計但當以數息靜慮法門澄斂昏掉念頭以楞嚴圓覺兩經熏灌般若種子久之動止昏明靈根漸茂則於千生億劫久睽頭面當必有正眼覷破時節在耳此又出世豪雄實貧道所深有望於先生者也臨江盧晉明居士名大壯為李見羅先生上足性宇開朗心地瑩潔兼之聲律身度真後學楷模聞幼令郎年可入小學就外傅當得此君為之依歸第其家貧而孝恐不能舍親作遠遊先生力能移其家致之左右則豈惟令郎蒙養攸賴即先生他日林泉燕寂亦法侶得人矣先生其圖之刻藏道場業已卜吉五臺山檀越亦既捨內而就外緣約四十分期訂十年今盟集亦庶幾十有五六第念世運乖和三災兆祥不知終作何狀此雖繫之衆生福業輕重然今日宰官居士曾面承靈山付囑而出現者寧能忘情於此乎哉於先生是望於先生是望與顧襟宇少參明公以粹美之資布寬恤之政使境內之事百廢聿修時貧衲正挂錫福城所幸機氣冥召遂令千載名藍墜而復舉向非明公願輪有在何以得此嗣後貧衲曳杖北遊謂當與明公會于長安至則憲節已詣江州矣徒有悵惘日惟與瞿元立曾于健于中甫三居士為法喜遊宴寂之暇時復同元立輩商確刻藏緣事始定長緣四十分分歲百金自一人以至多人惟信心堅久者許與之近過江南因遊貴邑貴邑檀信不請而集輒舉二分餘乃知向傳常熟多善人信不虛矣榮轉東還必遇無辱想無辱亦必能道其詳寺僧念明公為功德主乞貧衲一言迎于道左時方炎熱願明公以法水灑潤意地令常得清涼為法道光此野人之祝也惟明公少留意焉復王元美居士是月十九日拜領刻大藏敘捧誦之餘鏗然金玉非夙具深心其何以有此且寄汪司馬公翰札不獨丐其以穎光三昧作大佛事而兼屬以檀波羅蜜為助緣又非具大悲心者何以有此耶貧道每自慚德微鮮願力綿脆顧欲負九鼎圖適千里誠莫知所終乃今幸賴諸明公光嚴照策或可恃不至顛蹶而寶所也方遠歸清涼無暇作新都行輿議周叔宗代往叔宗與貧道獨形骸異耳兼藉寵靈意者司馬公當亦無吝乎此也楞嚴問答機緣師在楞嚴問康居士黧奴白牯是恁麼受用居士曰但一味平懷不管他黧奴白牯師云恁麼則居士當憎愛關頭作麼生平懷居士無語師云丈夫家出言吐氣須有來由無自欺誑須有針線且莫作繡鴛鴦會去也與王龍池方伯已下四編己亥年酉月望從忍可師伯處得來德音睽絶奄忽兩載心光相燭猶夫一日地藏這塊石在心內心外話未委此時得其安放否惟此一實餘二非真古德云參須實參悟須實悟才落思惟便成剩法每念話言之難再益傷歲月之云遷千知百解盡屬偷心鋸窮木斷斯為了義願居士圖之刻藏因緣歲集檀越四十分分百金期十年終事江南善信頗發肯心而北地則罕有應之者以故緣尚闕如楞嚴圓覺維摩經各一部僧寶傳一部緣起一册附充法供蓋衆生以法為命法緣涼薄慧命希微世流日深覺途愈遠苟非頓了寧舍薰漸此又知解之門固知居士未甘點首然破裘百衲足備嚴冬要亦未容輕擲也何如何如與徐文卿居士大疏嚴挺可畏而旨意云云國是可知使賈生在今日當不止痛哭流涕已也足下此去差所決當稱疾得請便以此官堅臥東山無復走迹長安斯為勝策成就世俗之功名蔭資且有定局上縻國恩下損家業疲精力以浪光陰豈丈夫所為況自己千生萬劫頭面了無下落尤當切骨痛心親依師友蚤莫提撕以求迸徹寧復有此間長工夫共馬蹄逐逐浮沉塵浪中耶倘以不肖之言為然則就差即遷轉內不過府部屬官外不過郡州正佐皆未若今職間散無諸統屬如未肯心則歸江南以區區此意決之仲淳中甫然後具請亦可也吾知兩居士當必為我點首刻經因緣大都北方緣差勝期場十有八九定在北方擬刻成則移就南方以流通之計得四十人為緣首每人歲助百金與刻工相終始燕趙齊魯大約有二十人江南如金壇之于丹陽之賀吳江松江諸處擬求十人外十人則求之徽州蒲州二處夏間必走江南訂集因緣秋冬歸北以起期場光陰迅疾敢復怠緩松江必以足下與康孟修為緣首聚資即自今年始足下此去其圖之唐元徵當在松江列中渠每年量力或十金二十金足下行時亦當與訂定令其歲有額助以入龍華而松江會中亦歲為其登數吳江必以周仲大為緣首而沈及菴顧元玉周季華則左右之足下過江城亦當預為白意趙居士凡百輒通內甚損光明諸公舉動決當謹慎刻藏因緣未必就賴渠力足下亦不必過為委曲此意亟宜致之曾司馬恐僧輩無遠見謀近利不知護惜傷其體面昨聞有佛像等物遺諸公此甚不雅而一如師竟不為制止何也可恨可恨大都諸公于此輩非有不肖在為之持衡方便絶不應往來交際弘明集南方每部價銀八錢北方加三二錢此康虞書至云云蓋此書價至一兩不可復上矣孝甫既不肯發足下竟為帶銀託康虞印之每部亦只可定價一兩印則必須全部初議七本頭以當時刻未完工故也三千部之命今不必拘泥若孝甫允從一兩一部儘其所有為成之餘銀帶付康虞印補可也袁微之請藏事必經不肖手乃可都城光棍非足下所能料治慎無為左右人所中昔馮開之所請既有有司為之督促而開之于此且甚諳鍊然其中包藏重沓破爛不可勝數昨年不肖才為補完今足下若為舉事必不完美令我受托不終況餘銀皆不肖用費無復存之龍華者此事必不肖至京乃能勾當足下當己之借用銀竟送付龍華可也潘匠所制鐵鉢甚佳足下當謀之孟修再為不肖製一件大小樣式悉得如本師者斯善矣內君近來無病否保郎何狀凍筆不及餘與傅侍御別至清涼于其最幽深處丈室杜口謝緣即妙峰憨山二師舊棲隱地雪覆千嶂人迹絶至出戶便穴冰雪為竇僅一山童充巾瓶侍者甚古拙不解他事日相與煨榾柮煮燕麥以款飢寒此外則燒柏子跏趺靜慮時證入空無相無願三昧遺身心忘旦暮足快生平兼之髮長寸許貌枯羸若病狀獨精神則清王可掬想雪山老比丘當年光景殆亦不過如是間從三昧起念諸法侶馬蹄逐逐風塵欲剎那際入此三昧一相覿面受用少分豈可驟得惟門下其庶幾身雖入廛而心恆過我不離當處遍踏峰巒此又不動一念遠相鑒知足下為我點首否五臺因緣向云云甚草率不足據昨歸山備採之深幸本山都綱司額有申文撫按司道事例省平地起風波動世驚疑又幸撫按司道即批申告示皆超情破格尤便踵行因擇其切要四事私為屬草先請命繼且出以示該司令其具申儻其如所云云批發則千載名山之幸豈惟現前聖凡大衆萬口頌恩即曼殊老師亦當于金色界中合掌加額題請云云非時世不敢望第借以速有司奉行耳立碑最為切要即題請亦一時故事立碑則千年標幟也其戒淫一節初意欲重懲二三以警什伯已復念之晴空霹靂則其人必推原所自今僧司既申劾有司而批詞末復末復則彼此當有鷸蚌相持之勢此時乘而利之乘此以清外障乘彼以蕩內魔兩無姑惜兩有顯對各心死無憾此又在漁人運用之妙耳雁門兵臬大有吏才墾荒蓄賑皆其政也幸善導之令作名山護五臺令亦篤實忠謹幸提獎之其遊山一節業既有批申之舉則未可如向所云云恣其遊覽以壞世相兼重煩有司而致其猜疑但登遊五頂及菩薩頂顯通圓照塔院三五大伽藍斯已若高僧則概不可請謁因緣皆有日在也聞慈壽主人為塔院住持有所請求慈壽非高明塔院最愚俗或未免以一己之私纍足下之公當察之無輕聽妙峰老師居蘆芽當得善巧放一光以照臨之近奉敕賜大藏有敕諭及御製序相府讚文因此為其立石可乎或更別有方便在也蘆芽為邊山亦不可過情犯世忌來物議刻經期場向已十八九決策靈巖昨歸清涼有僧告以此地信名勝第與黃巢故址比鄰其遺風流俗猶有存者迄今四山多豪客竊發業于鹵劫不以為怪雖有司莫可奈何不獨四山即靈巖禿民大多其種族謂此山凡行人欲入泥水試堅利化驍頑則可藉欲舉緣事集檀越則不可此僧曾居彼三年且老成練達其言有足信者因作思惟此期場非眇小所有一切因緣大小美惡始終彼此惟諸佛如來悉知悉見終非隔礙凡愚所能測識趨避至元旦遂以清涼雙徑牢盛靈巖四名山求鬮于釋迦如來文殊遍吉兩大士及諸護法善神以決狐疑乃三舉三得清涼今則有不得不遵如來敕命矣清涼山水渾厚盤旋足下一入遊觀當亦肯心自許此去聊城道僅倍靈巖亦不甚遠法門最近肉骨亦惟足下足下當不以東西而異視之顯通寺為清涼首唱其風水亦甲諸剎唐觀國師造華嚴疏鈔即其地其規模猶唐之舊欲舉事當就此但禮聞來學不聞往教此時山門甚凋謝得門下垂一語囑都綱住持云此山門恁麼陵替何不請高僧為興隆之間或又問達觀老師父密藏師曾到此否則此輩當自有來學之心矣不著色相無盡藏妙用不屬穎君不肖二月盡出足過蘆芽一訪妙師復由燕都牢盛走江南唱諸法侶結集因緣期秋冬歸山流光幾何敢復念緩計此時門下科場事畢或復命或請告當亦聚首聞太原有王龍泉方伯蒲州有山陰宗藩皆久馳法道刻經因緣門下能為先通否晉中善信有可以宰官身得度者併乞留念與某往客隆興辱不鄙日三四過謁皇皇道途其不知者以為奔走直指豔豪貴其知者以為偉哉陳生乃迫迫一鄙賤衲僧爾爾時鄙人竊覘足下不倦勞不武俗不羞衆議而中外恬然遂為勒之心印至今尚文彩熠熠炫露也昔魏公子無忌執轡侯生侯生益驕公子益下觀望益衆公子益恭謹稱訾者沓臨而侯生公子益相安不為意以故公子卒賴侯生竊符椎晉鄙以解圍邯鄲而聲震諸侯稱雄四君而鄙人于四君亦竊獨豪美公子鄙人非夷門侯生而能為足下方外侯生不獨鄙人天下之為侯生者不少也願足下于此一段氣分極力擴充擴充之盡又且日以信陵因緣默自薰發久之必能掀翻大事徹悟無生與淨名龐蘊把臂菩提解脫場作豪雄丈夫即于世法為上為下亦自剛毅軒烈有鬚眉氣象彼晉唐風流宋儒理學皆區區臭腐非所望于足下向示今秋欲肄業燕都北城龍華寺方丈有月清上人雅能敬慕賢人君子必能為足下得善所慎無借居內宦莊園一與此輩從事即無能進修己業矣祝祝月清乃祖瑞菴老師為都城緇林中孤松老柏足下當禮重之餘不悉卷終與真實居士已下七編辛丑年正月虞山錢牧翁發來刻入世路崎嶇人情冷暖自古記之而今日之長安尤非昔比奚忍見聞足下宦情輕重厚薄已不待今日印知縱鳥投魚樂應無極第法道秋涼非有力莫能匡護此又為佛子者不能不為足下動心世道危險憸宵得以傾戕善類此又豪俠知己不能不為足下含聲憤恨憤恨也大事未明臭汗未出古尊宿機緣語句纖毫未透誠今日所當急切用心不爾則足下之可憐又不在一生之得失短長而在千生萬劫之沉淪苦楚即具一知半解一場熱病盡付徒然竟何實義來諭謂病在雜用心此標也非本也本在生死心不切耳生死心若切縱驅之雜用其孰能之師友遠離互失鞭策彼此病同念同但以法門種種無能粉骨析骸博一定奪雲分萍散無時是已奈何奈何老師每屈指法門根器并長松明月之下念及江南法侶獨注情足下居多即近日世諦因緣亦有足下千生萬劫不能酬其德念者苟非真實奮猛各自努力相負實多老師二月間往清涼夏畢之峨嵋不肖不遠亦且往清涼俟老師行時或隨其杖錫西遊秦晉乃返或竟歸燕都或密走江南江北定刻經場所此皆至清涼始決之刻經因緣肯苟就無勞旦夕即大舉就不難第不肖意不欲居北又兼此時緣有所當諱避者即失一時之近利存法門之大體吾寧也此其大概亦既與仲淳籌之且詳傅金沙居士大有信心深念春間集諸法侶矢志捐俸為唱緣此因甚正不肖近計欲法此求四十人每人或自力或藉他力歲出百金每歲可得四千金不十年足竟是事而三吳及燕晉齊魯亦可覓四十人歲有退失即歲覓增補之常令不減此數此計行而應避之緣及僧家分募之緣可竟謝之而法門終無他慮矣此意足下與仲淳熟計之以為何如仲淳實我輩生死肉骨其居憂也哀傷決重惟足下時親密之寬慰之務全其必死之生數千里外懸懸寸赤他無所屬矣廬山徹空老師為江南大善知識其徒心悟者不遠萬里奔逐為求塔銘老師謂此段光明必從足下筆端流出始能照耀匡廬永久健齋居士與不肖等僉以為然遂令悟上人往返牢盛求行實南往健齋居士業已通其懇懇不肖所徼惠足下者有速成而已蓋黃龍潭近有慈聖皇太后新頒大藏且至悟上人急欲得此文先往更理治接藏事宜耳足下蚤就草一日則不肖多受惠一分祝祝悟上人為健齋居士舊交其候足下於武林幸一安其包笠天台萬年寺亦有賜藏乃龍華明因二主人齎往二師實都城名德敢希寵一顧禮之并命一便庇其關渡之擾補藏附往屬歸之楞嚴矣止欠一函并闕卷繼圖之金山楞嚴賴力護感荷可勝言緣起緒言各一册諸公願文謄録者一紙附去緒言得翻刻江南為妙樂子晉近狀何如二令郎善訓誨之又數日太勞身體恐欲作疾奈何二上人其力亦頗能立塔此段因緣決當今日了之不爾儻足下他日有正冗或遺亡則咎將誰歸此貧衲終不忍默默於足下者聞足下事繁即生厭惱此甚不可何也一厭惱即自苦身心從上參學人不能於事外得心從上修行人不能於事外證果古德有言但於事上通無事見色聞聲不用聾又云日用事無別唯吾自偶諧臨事儻自己正分光明不到或瞥起處不能隨處冰消雪渙即當以此頌言轉念少助自己苟於事為關頭不得自在恐自今日窮未來際無有無事時處承教不忍貧衲為求見足下者作傳置邇來果瑣瑣足下誠自慚愧第來者尚不止此所報者知係足下必不可已事要之實貧衲受纍視足下增倍耳願足下耐煩將佛門事與俗家事等視之即無難也非貧衲非足下不進此言願足下聽之鳳老回書決當作過此老極尚清虛懶於人事足下簡末之言無異以水灌水且啓其慢僧之失非天子不能賞罰人非智眼太清不能揀辨僧行得失今足下以此言簡鳳老得無與之而不得其人則僭耶從此貧衲決當體諒足下繁劇足下亦當諒貧衲不得已而非有他腸也有暇過坐半日何如又本師度夏滁陽因夢中見貧衲病狀使慈航回視有書致門下附上備訊其接納諸公曲折若湯海若鄒南皋丁勺源皆信向老師之極南皋至滁陽尚追趨之焦從吾亦信之篤獨勺源根鈍且世間情重雖信愛不能趣入雅自恨之深耳南皋前與門下書聞其筆底甚多雌黃豈豪傑丈夫而有背面耶其書願即檢來一看旋送上兵諫之諍南皋亦甚護持楞嚴近來搬運石料日日震喊兵尊處似不可緩其通苟事敗救之晚矣早晚尚期入城委悉滁陽事體因上人去平湖儻轉檇李貧衲當款理之第緣事無善策以應王老先之念奈何奈何此貧衲與足下所共苦者古尊宿語録開卷不覺神情奮武莫自禁躍如態狀真奇貨也留此校對完方可送去又仲淳攜足下手書至展讀不覺哽結末世有情大多誑曲成習求真心直心自急急人者絶少足下赤心片片甚足爍我中懷故為動念貧衲此行蓋為事有不可思慮所測識者且光陰箭疾恐到老猶然話杷無實究竟不得不急大都事在南方斯為定議第足下亦當早晚切切心願共期成辦地事烏陵萬萬無議赤山太陰星但無甚縈結之土地卻真正開穴若得淡白之土上少有沙穴中亦無即可厝耳無太為榮辱所惑空延歲月至祝至祝聞子晉病楚貧衲寒竦毛骨幸足下善調護之蓋貧衲法門一左臂也又彭城別去仲淳旋奉老師東走牢山謁憨山師共計法門大事驅涉道途旬月乃至而憨山師先期入都城令人悵恨幸我輩願力頗堅真恰於出山之日而彼杖錫至矣相見不移頃盡傾肝膽此師氣宇軒豪心地光朗且具正知正見而熱肚腸又蒸蒸可掬真世間奇男子出世壯丈夫足下昔日舉揚實未盡之校藏之事已訂計牢山近有欽賜北藏南藏未有茲就印造凡裝潢買紙俱願足下維持之紙張得如善卷斯美或得了虛師指麾一二尤美足下其圖之新刻經書憨師一一願見併留意牢山山水稱絶震旦不可不與仲淳圖共登賞此山故為佛氏道場元丘長春刻意毀之今銅鐵佛羅漢像首堆之巖畔殊可寒念儻此山復興則齊魯衆生寥寥數百不耳佛名者盡入大光明中矣何幸如之又居士為兒女婚嫁所迫仲淳居士恆切切念之但道人行事一切處只得隨家豐儉不獨婚嫁夫人諒吾與否亦自聽之不爾則我本有靈光未免受其蔽塞瓶寶法主化去意者又貧衲夢中五齒之一乎人命無常良可驚惕建塔天台居士主張誠是塔銘須就實而作毋徇人情季居士中軍非謂居士有意禍之第恐不知誤為人所中故蚤達之耳老師解夏或有雙徑天目之遊居士當掃緣以追隨杖錫老師如大海水我輩多近一日多受一日之潤惟居士念之又刻藏因緣科臣有言幸宗伯題覆無恙此以世眼觀之似屬魔嬈以道眼觀之實所以增法海之潤助天鼓之音也今且聞者益衆而受浸潤者益廣矣矧未事之先已逆睹有此茲何尤焉足下之補實出輿情而臺翁特從中從臾之其未來節次業已有成議或不至久稽外職惟足下無守舊見濡滯林泉丈夫出處當自有時節因緣不以人情暌合世境依違而作進退足下今日固當出之時此實世外人以便眼從中諦察即足下亦弗自知若徒以見私揣量於人情世境上決擇依違非道人之護念也昔古德有為知己舉住持弗應後自往索之知己詰其終始所以異曰偶欲之耳此真孤光獨露照世法幢所謂師子無伴大象不拘者也惟足下以之臺老護法心真切其知足下尤非群情所可及當更無以一時人情而作親疏想祝祝知己之言肝膈寸寸幸直下當之
