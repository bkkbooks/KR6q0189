body:
  text: 密藏開禪師遺編序法界乃法界人自心共成之法界原不限人于聖凡同異人不以法界為心不以法界為事則彼人自異于法界非法界拒彼人也人能以法界為心能成法界之事則法界是此人自能為主亦非此人別主心外之法界也豫初讀普賢行願品于諸供養中以法供養為最乃至常隨佛學毗盧遮那如來從初發心精進不退以不可説身命而為布施剝皮為紙析骨為筆刺血為墨書寫經典積如須彌為重法故以至與十方法界同證菩提猶念念不捨豫乃大驚曰此正以法界為身以法慧為命而為十方法界之主中主者也因發願作植聖草中有刻經著述章皆以法為續佛慧命後讀徑山刻方册藏緣起諸公極稱達觀大師與密藏開公能創發此大事且引昔有老尼以刻藏之緣自斷其臂誓開此板至沒身未完其徒小尼善繼師志亦斷臂而終其事豫又訝曰此二尼豈海藏龍女能轉身為大丈夫而成無垢界正覺乃今復有達密二師資而乘遮那如來夙願成此法藏之始終果海者乎此豫所謂有能以法界為心法界為事者又誰于心外能同異之哉更有最異而可疑者密公既從達師創刻藏因緣于五臺又議遷此板于雙徑楞嚴事將成而隱去卻不能如彼尼子以終其前志而更遺憂于其師者何哉蓋天下美事造物不與人全密公知此舉將成不若讓功與同門者併力為之使此板有終又或藉此自退以幾諫達大師處亢于無悔此非泰伯與夷齊以忠孝為仁讓者何能若是乎今秋豫倚杖皋亭門人樞子遊雙徑值王祉叔居士談及往事因囑按指上人持其先祖密大師親書發願刻藏文卷及其遺編屬豫為敘及讀之乃知密公真不出豫意之所逆也願文中以萬曆壬午于紹興見古寺殘碑載勝國時會稽郡大藏板凡七副因感泣刻板之在一郡者且爾其流通天下者當何如哉況我明僅南北兩板法道陵夷莫此為甚遂願畢此生身命募刻方册板廣作流通尋入檇李得覲達觀老師兼晤馮開之諸公業已先發是願即共訂盟從事豫于此乃見二師真夙願再來不謀而合也至閲遺編雖是為刻藏因緣與妙峰憨山諸大尊宿及陸五臺馮開之諸大老書劄其中多自敘參學及就事隨機激揚啓發非忠君愛國之微即本分生死之事或拈提向上機關或指點今時利害刀刀見血殺活有神誰謂此公非了手人非登壇士其語非説法拈頌為不可視如今時雜出之語録乎因果不昧乃今六十年後有腳下兒孫如按指者搜出此卷編能使我輩贊成以公後世不獨大藏因緣愈見達大師能不惜身命為法界主盟及諸名公之願力有光而此如來藏性種子更當熏發此五分法身也豫方在長干命門人松影麟子與諸護法共修大藏梵册板又得此證盟今日之願與有法界為心者益不設自懈而成此主中主之大事云戊戌秋日浪杖人道盛題于崇光之雙桂閣密藏禪師遺稿序密藏開禪師遺稿法孫按指上人所收輯也藏師英偉雄駿千仞璧立為紫柏尊者上首法筵海衆所至雲涌定中知本師將有王難刺血上書一夕隱去師資閟現群龍無首諸天鬼神猶不能測知而況於凡心凡眼乎遺稿多所與群公書問諈諉勸勉以扶正法刻大藏為責任其為人仕者教忠顯者教退亢者教隱競者教恬根器濡弱者醒之以月愛情塵軟暖者觸之以冷雲筆舌聰明自負宗眼者必勦其扳援搜其負墮俾命根刳斷而後已智眼分明慈心諄復熱血痛淚至今凌出於紙墨之上以方袍世外之人省邊略憂國計當貢場款塞之日抱靖康左衽之虞人謂其杈衣遠遁蓋已懸鏡今日非偶然也國朝自楚石泐潭已後師絃絶響崛起為紫柏海印二大師而藏師為紫柏之嫡子龍樹言那伽或言龍或言象水行中龍力大陸行中象力大此三人者豈非龍象乎難陀跋陀二龍王護持正法修羅將戰二龍王身繞須彌山動雲布以尾打水大海浪冠須彌忉利天始知修羅欲戰而嚴攻伐古來尊宿大師現身出世蹴踏天下自然有如此氣象其不然者則螣蛇爾蜥蜴爾種性既劣威神無幾顧亦欲噓雲歙霧激海水而冠須彌焉可誣哉藏師此文皆叢殘不經意之作方諸二老如流星之奔彴芒焰驟作有聲曳其後而殷殷於天漢之間其它皆蚌珠爝火流照咫尺誰得而並之二百年來豪傑間作法運通塞文不在茲或者猶欲以餘分閏位竊竊然議其統系佛言譬如窮人妄號帝王自取誅滅孔子曰小人不知天命而不畏也可不懼哉往在武林與天界覺浪和尚明燈夜談相對嘆息其為藏師稿序亦出少分而浪老又順世去矣撫卷摩娑泫然流涕者久之上章困敦之歲辜月長至後二日海印弟子虞山錢謙益謹敘密藏禪師遺稿序衆生證佛原以光明若度世非真則無生亦妄佛於歷劫後種種世界之事無所不知而善知識於數千里外數十年後之事未有能一語中之者雖終日談空説妙求豪傑不退菩提心不可得也豫生平未嘗究心內典而先君遊於紫柏尊者之門以密藏禪師為畏友每言尊者門墻高峻而師穎悟絶人於書無所不讀先得長生久視之道自謂當世莫之與京初見尊者對坐引古今論性命尊者不答至三晝夜尊者知其機鋒已盡始語之曰吾以汝為奇男子乃含沸矢噴人耶師大驚悟伏地叩頭流汗透體從此追隨杖履幾二十年師立志刻書板大藏流傳於世而尊者與馮太史輩已有同心萬曆丙戌師弟同入京師慈聖皇太后知有刻藏之舉欲發帑金命刻尊者謂宜令率土沾恩師願以一身任事遂撰文廣募隨立規條始於五臺之清涼後移於雙徑之寂照師多方拮據親自較讎一時遺書諸名公大率為此尊者再入京師將了圜中自在之偈師知必及於禍遂刺血上書遁去尊者覽書墮淚曰吾尚有一副鉗鎚斯人去無所用之矣師不欲以文章自見故多散失且無刻本今師之五世法孫按指上人欲竟師刻藏之志攜師遺稿來自徑山索序言於豫將付之梓豫捧誦之不覺掩卷歎曰嗟乎以命世之才逃入禪林無怪乎世事之莫辦也豫不知佛法不敢強作禪語但能言吾所明不言吾所疑吾所明者未必是佛菩薩吾所疑者的是地獄餓鬼畜生則有一語普告緇素藏師當日談世事痛哭流涕如老成憂國每及陸沈愚者以為狂言即智者亦以為過慮至今其言已孚於卜筮談佛法亦痛哭流涕如佛祖慈悲蓮生舌上不特大衆歡喜讚嘆得未曾有即紫柏尊者尚視之若摩尼珠若獅子吼豈其了生死反不能如燈取影耶金壇後學于元凱題於雲林之墨光亭密藏禪師遺稿序丈室之內床書連屋桐蔭拂階豫顧樂之欣與影謀於時秋也幽煙冥緬空林綿濛素月照間庭芙蓉映衰柳為誦秋水伊人之句童子舁籬菊數本置几案間因燒燭看壁間影窗影靜影傲影竹月遙答影類禪機明妙渾脫瀏灕致足悟也夫俗世常戀豫素勿歡顧獨耽本業偃息萬卷中比又涉禪鑽義義格捨義義牽鐵牛背虱苦無入處乃心獨好之謂有情水泮空境秋澄衆生總是佛身大地罔非淨土也夫古德舒拳貴空能所真如弘覺務活慧根是以青蓮喻法重開劫外之花寶月麗空一洗區中之霧使道體淺薄徒墮聲聞牙瀋口腥陳因相續庭檜何香西來何意此燈不傳久矣至若德契勝蘭聲追安遠探鷲峰之祕旨襲龍樹之芳猷意珠其性月同明戒香與覺花齊馥固已機鋒如箭抑且義學如淵則豫于密藏禪師有深慕焉乃時遷世遠法語沉湮厥五世孫按指穎公欲紹刻藏之願搜搆遺編竟得于耆舊之手而手澤箋疏復出之荒院之間雖禪師之慧覺長存乎亦穎公之善述也豫友丹山吳山人為穎公倡以壽之梓索辨于豫豫讀之見其或矢願于度生或鋭志于弘法或踵會元而直入或精彼岸而誕登或慷慨于家國天下之間或預識夫成敗興亡之際其克肩鴻巨露之于重刻方册大藏及興復楞嚴禪寺乃終蕭然絶塵蟬蛻世羈之外何也要知海水非音鬥蛇非字池草奚關詩句江峰寧涉禪心然解者得之則陋彼槿榮珍斯天性故祖家欲燒故紙文家欲空萬卷軫雖殊道則一也所以涼雲杳壑津寄惟深琅函寶疊總成活句讀是編抑深豫秋水伊人之思矣霜氣肅林月光透紙豫將參密師于蕭疏菊影間密師其許我否戊戌季秋止庵居士王祺題於溪上之松浮舫刻大藏願文手卷存之徑山另録此策留吳江周季華居士處俟藏事告成附刻藏緣起後願力深廣定有繼起肩荷者無慮其不克終也道開謹書為左券本師和尚同開之仲淳兩居士證明密祖願文刻於戊戌冬諸大士願文并券語辛丑五月壽光法姓從吳自周安石居士處得來亦時節因緣珠還合浦之意因全刻於帙時辛丑重九契穎述凡世間創一物建一事垂一語立一言必精誠兼到故垂久而不沒即沒之而後有以慕思精感者必獲焉按指公幼為沙彌時忽得密藏大師墨迹刻藏願文如親授受而悲喜珍重後二十年又得同時諸明公同日發願文今知密大師以書帙龍藏流通天下後世雖功不與焉而不知彼時垂一語一言皆精誠般若之流出今五世孫按公又得輯而梓之衍得而觀之能無慨繫數語以志緣偶云爾鏡花頭陀中衍謹書於古梅蘭若刻大藏願文道開既剃染即知作佛子當報佛恩蚤夜矢心顧不知報佛恩事當何出萬曆壬午從補怛天台詣武林於紹興道中忽見古寺殘碑載勝國時會稽郡大藏板凡七副因感泣思惟板刻之在一郡者且爾其卷軸流通在天下者當何如哉乃我明僅南北兩板法道陵夷莫此為甚遂願畢此生身命募刻方册板廣作流通尋入檇李得侍達觀老師兼晤馮開之居士輩則老師暨諸居士業已先發是願即共訂盟從事遑遑三載莫得其緒丙戌春走長安籌之傅金沙居士輩反覆思究審知善建事者必先植本本植則枝幹卉葉自然叢成乃定以善信十人歲各捐資為唱緣又一人則各勸三人為助緣蓋分之既易為施易為勸而合之則其資甚裕又其功為有繼至於捐助之廣勸發之多不可思議格量固自有諸佛威光臨之諸善信願力持之照創事之初則不得不以是為定則也居士等因一一發心且各疏其願盟之諸佛并歸道開以為他日經成之券道開藉十大士深心弘願得畢竟是事以報佛恩即碎頭目髓腦作栴檀香充遍法界以供十大士猶為未盡願與十大士共證之萬曆丁亥春正月望比丘道開焚香謹書刻大藏願文密藏大師唱化國中刻全藏以廣流通此東土一大因緣也青原人曾乾亨一聞發歡喜心深惟下劣自聞佛乘以來日用四威儀中恍然別是一世界每誦內典一句一偈便覺靈根滋長矧此全藏如大雲雨克遍大地叢林卉木靡不沾潤欲報佛恩舍此流通奚先哉乃矢心自服官以至歸山俸資隨分捐助轉相化導效此涓埃無始以來漏業消殞速徹無生及四恩三有微塵衆生同此願力同滅罪垢同悟菩提飲一滴慧水即泛妙莊嚴海出萬劫沉輪立證毗盧法身十方虛空尚有量我此宏誓永無邊弟子曾乾亨百拜謹書刻大藏願文宅自小年每每衆聲宣揚佛號則悲淚不能自止後讀大阿彌陀經於吳縣齋中方及半而痛哭流涕襟袖沾濕亦自信夙緣非偶佛恩難報但未知所以報耳及讀楞嚴有云將此深心奉塵剎是則名為報佛恩乃知欲大報佛恩莫若廣揚佛教即自今生今世以至萬劫千生虛空有盡我報無窮是以聞密藏上人流通大藏之議而欣然樂為謀始且約諸名德共為助緣在官則有俸可捐去官亦隨力為施更復轉相勸化資益無方惟願諸佛菩薩共作證盟旗場起處工用咸來法鼓鳴時衆聲寧寂放大光明於無量世界布大利益於無量衆生人身有生老病死善念常存世界有成住壞空正法恆在宅願將頭目髓腦髮膚爪齒一一碎為微塵隨風飄揚分向各各世界各各衆生前贊此功德便使此一一微塵身代一切微塵地獄諸苦有大歡喜矣宅有兒爾庚甫八歲似有種性者甚惟達觀老師及藏兄所憐今以身師事達觀老師而以兒事藏兄助緣隨化父子共之云弟子傅光宅薰沐和南謹書刻大藏願文我佛菩薩視衆生沉沒苦流不啻身受其苦欲拯之覺岸乃竭其慈力因病授藥巧譬曲喻殷勤反覆誘掖衆生故有是一大藏稷自髫歲則喜讀其言今年已四十顧根器凡狹菩提涅槃尚在遙遠然歷諸患苦患苦恬謐歷諸險阻險阻坦夷仰荷慈力深遠難量旋視九界衆生其患苦險阻如稷者過於稷者殆不可勝計念是而不贊佛弘化則真斷佛種性之忍人慈值密藏師兄欲梓方册全藏以廣流通欣然契心遂尾諸淨侶長跽佛前而説誓曰願畢我形壽力荷此法藏苟可效我力靡所不自竭念昔佛菩薩以此法藏故剝皮以為紙析骨以為筆書寫此經卷積如須彌山今此真丹國陟釐瑩於玉無事以我皮充此法藏用使我皮可用剝所不敢辭域有蒙氏筆無事析我骨使我骨可用析所不敢辭我今雖食貧檀資當勉具歷仕及歸農隨緣力為辦不直此一生願盡未來際常以此法藏普度諸衆生那羅延窟學人瞿汝稷盥沐槃談書刻大藏願文文獻溷風塵久且根器鈍劣無能窺大道頃歲從達觀大師密藏禪師稍聞緒論始知佛恩最大欲報無繇中夜思之可勝慚赧會藏師兄倡刻全藏諸同志捐資助之間以語文獻文獻竊惟古之開士或以半偈捨身隻語析骨文獻悲夫哉乃敢遜於前茅而令大教流通法霖普被所以上報四恩下讖種種罪業孰逾於此遂欣然願豫斯盟籍斯願力或得早證菩提不致沉淪永劫云爾丁亥春正月榖旦學人唐文獻刻大藏願文往在吳中聞達觀密藏兩大師欲刊大藏因緣私竊喜之恨不旦夕就不自意復從傅金沙諸君子畢是願也歲丁亥上元密藏師約赴龍華道場各發願言成就是事鳳儀稽首向佛而説願言曰山河大地本清淨云何世尊出世間四十九年所説法胡為在在咸欽仰良由衆生夙業重非此莫能成解脫試觀末世諸苦楚何者不由貪嗔癡使得一聞半句偈豈不回心證所有奈何經義久寂寥縱能持誦不自解儻使大藏遍十方十方應有發心者開今既已作是念我等寧無贊嘆心願輸生平俸所得積日纍年證斯果更為廣約諸同好隨所布施報佛恩唯願諸神咸擁護務俾佛法廣流傳凡我同盟諸君子生生世世為眷屬三世諸佛作證盟當知所願必成就南嶽居士曾鳳儀薰沐拜手書刻大藏願文佛弟子琰少事血氣去書學劍適志馬凡所為泥犁種子事心快稱勝自與友人繆仲淳氏周叔宗氏遊委曲導引痛恨前非及壬午籍仲淳侍達觀老師得為佛弟子乃翻然一洗舊習始知千生罪業半偈能銷生死大事彈指可畢自非諸佛衆生苦惱無有了期因知佛恩當報顧思報佛深恩莫若闡揚佛化廣利群生銜之已久未會其緣比以世澤來自都門濫竊冠裳虛糜廩祿國恩日重慚愧日深適吾法兄密藏募刻大藏為書册揚法利生莫過於此遂發願捐歲俸唱斯勝緣此經成日願盡大地衆生見者聞者一言半句觸著磕著頓徹圓明直取無上菩提惟此功德琰籍之報佛恩報國恩銷罪業又或朝市不久留當如歲俸與大藏終始願王不動諸佛證盟萬曆丁亥正月望日佛弟子徐琰和南謹書刻大藏願文玉立始生徵母氏夢知先世從僧伽來既壯獲承事達觀老師稱弟子始歸成法道十方三世佛事願一肩荷之摩頂至踵致之法王凡有一涓滴一毛髮可以報佛恩奉揚師訓者即蹈鑊湯爐炭令此身碎為微塵立歡喜奮決蓋虛空可隕此願不可移也萬曆癸未緣父母少所訓習詩書濫廁科名承乏郎署服官以來虛糜廩祿無有尺樹寸效仰酬國恩早夜慚懼會吾法兄密藏募刻大藏遂發願捐每歲俸資為唱緣即去官亦捐資如俸以終始其事諦知建不世之勳庸不如為國家廣一滴菩提水且立既暫作王臣便當作王臣中佛事此功德願我聖明發菩提心大揚慈化停毒蒼生又願此經刻成盡大地有情見者聞者豁開智眼永息苦輪徹證無生等躋覺位又願此經於佛法滅後放大光明照耀一切願王不動諸佛證盟萬曆丁亥正月望日佛弟子于玉立和南謹書刻大藏願文惟明世染堅凝智種涼薄向惟有志翰墨及壯尚不曉身心性命為何物釋典為何書萬曆甲申夏友人繆仲淳氏自真州招余過義興之善卷得侍達觀師稱弟子始知窺向然終以障蔽深重每展卷即昏沉瞌睡先是明將發義興夢入大伽藍見鑄巨鍾火光蔽天日以語師師謂此法音吼擊法炬光明之兆今諸名卿開士欲別梓藏典廣流通爾其或有緣于此藏中弘明集實文字般若前茅宜先就梓啓世聾瞶爾亦可籍是蕩滌情染發榮慧種明遂從事如師命丙戌冬刻就緒以他務入燕都會藏兄盟諸大士唱舉斯事明遂願與盟或自力或籍他力願歲捐百金與斯舉相終始儻賴諸佛菩薩冥加得溢于盟要之外尤至願也惟此願王遍入塵剎即劫窮一切法藏殞滅盡而我輩此刻如金剛牟尼不毀不變於一切有情摧諸邪見照諸昏暗滿足諸伶俜困苦直至彌勒下生遞續不乏惟三世佛陀證知我願萬曆丁亥四月六日弟子吳惟明稽首和南刻藏發願文袁了凡居士親書手卷真迹現存古梅菴比丘契穎摹梓我聞如是釋迦牟尼佛從周昭王甲寅年四月初八白降生至周定王癸酉年二月十五日入涅槃正法住世五百年始于周定王甲戌年終于周貞定王癸巳年像法住世一千年始貞定王甲午年終梁元帝癸酉末法住世一萬年始于甲戌至大明嘉靖癸巳歷九百七十年弟子袁黃於臘月十一日建生後去九千三十年癸丑滿一萬年月光菩薩出此方説法度衆生滿五十二年入涅槃首楞嚴經般舟三昧經先滅不現餘經次第滅無量壽經後百年滅至大惡世南嶽思大禪師發願誓求神丹大藥得長壽五通修習禪定次求六神通具足一切法門成無上道度諸衆生持令經教永永不滅修習苦行具足佛道功德面見彌勒佛我今亦發願先求神丹大藥誓造全部藏經書板普遍流通永世不滅稽首歸命十方諸佛稽首歸命十二部經稽首歸命諸大菩薩四十二地諸賢聖僧稽首歸命一切緣覺聲聞學無學衆又復稽首釋梵四王天龍八部冥空善神護法大將袁黃自惟無始以來迷失真性福緣淺薄上不得值釋迦出世下不得蒙正法像法諸祖師提撕了性用是沉淪六道枉受輪回今幸生末法人道中誠心懺悔破戒障道重罪勤修種種善道睹諸衆生現溺苦海不願生天獨受樂趣睹諸衆生昏迷顛倒不願聲聞緣覺自超三界睹諸衆生未成佛不願先取泥洹但願諸佛憐我賢聖助我即賜神丹或逢仙草證五通仙果住五濁惡世救度衆生將此深心永奉塵剎面見月光菩薩助揚聖教復同南嶽思大禪師齊見彌勒親蒙授記所刻藏經時將廢壞即出修補力持大法永不息滅又願得六神通智慧頓開辨才無量一切法門靡不精達世間衆藝高擅古今使外道闡提垂首折伏又願祿位偕崇才德並茂凡所施為皆有實際播種希稷河渠效禹敷教同契制作侔姬旦刪述齊孔丘種種勳烈萬世永賴馮籍寵靈護持正法禁塞邪途闡明正教使朝廷設科取士皆由釋典衆生從髫年受學即聞佛誨所刻藏經人人樂檢世世勤持法布無窮不可思議非貪年壽非慕名聞非耽富貴利達為護法故不辭塵世特假勳名作如來之金湯護正法于無盡懇求滿願日誦佛母準提咒惟願準提菩薩摩訶薩慈悲攝授自于萬曆癸酉余偕幻余禪師習靜于武塘塔院時髦勝友昕夕扣門注往束縛于世儒之説頻興疑難豫謂衆言淆亂折諸聖佛教入中國時堯舜周孔已沒聖人不作孰與折衷傅奕韓愈之徒挾其勝心騁其淺見而妄訾之宋儒遂祖之而布之訓詁令後世學者為童蒙時輒已入其説而蔽其正見未嘗測其廣大之境即已疑其虛無未嘗窺其堅固之門即已疑其寂滅間有一二豪傑能卓然自信者則皆誦其書而知其言者也因與幻余私議謂釋迦雖往法藏猶存特以梵策重大流傳未廣誠得易以書板梓而行之使處處流通人人誦習孰邪孰正人自能辨之而正法將大振矣逾十年癸未達觀大師寄迹于汾湖之敝廬余復與商確謂利益甚大又明年甲申遇密藏師兄于嘉禾之楞巖相與籌畫頗有次第即命余草募緣文而請益于吾師五臺先生厥後具區洞觀健參宇泰諸兄弟相竭力謀之事遂大集余則株守渠陽不得與奔走己丑秋幻余挾卷至官舍索余願文書于首此事倘諧此願不虛發矣弟子袁黃百拜謹書幻余大師發願文古梅菴法孫契穎手摹梓法本自惟根器下劣識習昏柔幸賴宿緣得為佛子更蒙達觀和尚獎掖再奮泥途始知有三藐菩提所當修證萬曆癸酉自金陵參雲谷和尚歸錫武塘遂搆禪室于本所受業蘭若中朝夕禪誦時項東源袁了凡兩居士日過我為法喜遊不以庸譾多諸啓迪智慈方便再世淨名雖象服攸殊金蘭雅契一日了凡居士與本矢言欲將梵典翻為方册俾家傳人誦拔邪見稠林歸薩婆若海奈何弘願雖發而實行不加法本竟滯寂山林居士亦羈迷世綱光陰駒邁良可惜哉歲丙戌豫章密藏開兄乃持是願乞檀燕都蓋念未來衆生沉沒苦海預布津梁其志若願視法本倍增宏遠允哉月光思大之用心乎一見語及心光照合時達觀和尚挂錫燕都遂囑同事以謝初心法本銜命歸清涼開兄寓燕都盟諸居士各發願以襄盛舉繼幸卜吉清涼而無邊老宿且捨菴建期筮事矣顧遊行海必假願王為之前驅而法本從事于茲已二年所乃未嘗傾誠三寶以吐寸衷今盥手焚香一心五體投地皈命盡虛空遍法界十方三世佛陀耶達摩耶僧伽耶千華臺上百寶光中本師釋迦牟尼佛大智文殊師利菩薩大行普賢菩薩十方三世一切權實護法諸菩薩而説偈言粵稽微妙典觸處恆熾然本非十二部及言語文字由有不覺者覺者出現世乘慈智悲願轉一切法輪令諸有情者開示與悟入念茲劫末時法海漸以涸法本不自揣願揚其波瀾于未來世中潤一切枯稿螳螂竭股力以拒轍康莊自身及與命咸所不顧惜假使務日繁勝入刀鎗林我以法藏故似飲甘露味假使魔為賊由茲加害我我以法藏故終不生退心假有別三昧疾得證菩提我以法藏故寧沉滯塵劫假生樂寂心而欣處獨靜即嚴焦芽戒奉此以周旋假我形壽短此生不了辦再出為男子當畢竟是事願以流通力洞解三乘法在處為開演覺悟諸含識願以此因緣現世作醫王病者聞見我頓令苦消滅願無盡衆生悉蒙我化導無一不成佛我方證菩提惟此大願王念念不捨離記憶及受持盡諸未來際萬曆己丑冬十月二十四日比丘法本稽首書念雲勤上人接管寂照刻場緣起實紀刻藏大緣實始於藏公稟本師之旨以續佛祖慧命者也不圖藏公匿迹遠引幻豫師代總其事無何亦復遷化後之權茲役者相繼迭遷軌則不一雖云因果無差終於事功有誤本師念藏公與幻豫師勤勞在昔而其法嗣勤上人夙稟忠實志存法門特作偈表信付囑南來專理刻場諸務上人不遠數百里訪豫金沙就豫商確規繩豫以此緣經始之日竊嘗與聞逮遷南之舉豫復有言贊成誼不敢默乃偕上人暨諸法侶定約允刻場向來檀施資財自萬曆二十八年已前事經數載人歷存亡交單固存勢難清理乃今定於二十九年勤上人接管為始每歲四方檀信一應所施刻場錢糧施主隨施多寡一一手登此卷刻完之日計共施資若干茲已刻字若干報命施主年終纍算查銷歲以為常設有臾代便立交單并支銷細數一一交明庶事體畫一收放清楚人心服而遠近向風矣未必非叢林之一助也卷名實紀者蓋取真實不虛果因不昧之義云萬曆辛丑二月朔覺休居士繆希雍手題刻大藏願文財法二施俱圓為檀度第一無如刻藏世世信心者於有為功德亦能捐施而獨於此惜錙銖如愛頭目何哉業重故緣薄也始藏公與余言宰官與緣者四十人人百金以為主而其它輔之不十年可完余亦踊躍翹企無何四十人者漸與時忤存歾半而登朝食祿者無一焉獨吾金壇兩緣不絶如線自戊子迄今十三年矣而於全藏不能以半則豈獨業重緣薄造物者亦若靳之默丈夫要自闢宇宙何可為造物所囿為業緣所縛宜各發勇猛心捨慳貪心種莫大之因為龍華前茅不然浩浩長劫有法時無幾何時是出苦日耶念及於此骨竦毛豎不孝雖貪願歲捐十金至藏完而止衣食可缺此不可缺當更始之時感仲淳之言走筆志之因以勗同志者同日念西居士王肯堂書己亥菊秋新安世德后裔孫萬里録刻密藏禪師定制校訛書法北南舊三藏校對之時一章一句一字一畫及提頭行款但有差殊無論彼此是非一概標出北藏之上并注草本北藏是南舊非則捨南舊而從北假如般若波羅蜜多心經波北作波南作坡或舊作沒但從波而已卷末校訛款下則不必書南舊藏是北藏非則從南舊改正假如觀自在菩薩自南舊俱作自北作目竟改從自卷末校訛款下宜書幾葉幾行自誤作目從南改正三藏文雖同而義俱錯則出己意於校訛款下假如行深般若波羅蜜多時深三藏俱作探據文通義當作深則卷末校訛款下宜書幾葉幾行探當作深有少疑未決則書幾葉幾行探疑當作深其文義竟莫可曉則書幾葉幾行探疑有誤三藏文異而義俱錯則互存而更出己意於校訛款下假如照見五蘊皆空五北作互南作王或舊作丑據文通義當作五則卷末校訛款下宜書幾葉幾行互南作王舊作丑疑當作五或文義莫可參擬則書幾葉幾行互南作王舊作丑疑有誤三藏文雖異而義俱通則互存之假如度一切苦厄一切北作一切南舊作無量文義俱通則卷末校訛款下宜書幾葉幾行一切南舊作無量或南作無量舊作諸則書幾葉幾行一切南作無量舊作諸此字送去周季華居士但凡送經與人校義即宜依此謄一幅與之更須與講説明白若止對字止須以檢經會約與之一本不必與此樂子晉居士誓願與貧納清校經藏凡有經欲校義付刻可共商之丙戌二月初五日藏筆
